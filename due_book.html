<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Due Book Pro - Stashio</title>
    
    <meta name="theme-color" content="#4F46E5">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --secondary: #764ba2; --bg: #f3f4f6;
            --white: #ffffff; --text: #1f2937; --light-text: #6b7280;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 20px; }

        /* Navigation Views */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header */
        .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 20px; color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 700; }
        .header-top i { cursor: pointer; }

        /* Tabs & Search */
        .tab-container { display: flex; background: white; margin: 15px; border-radius: 12px; padding: 5px; box-shadow: var(--shadow); }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 700; color: var(--light-text); cursor: pointer; border-radius: 10px; }
        .tab.active { background: var(--primary); color: white; }
        .search-area { padding: 0 15px; margin-bottom: 15px; }
        .search-box { position: relative; }
        .search-box input { width: 100%; padding: 12px 40px; border-radius: 12px; border: none; box-shadow: var(--shadow); outline: none; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--light-text); }

        /* Contact Cards */
        .list-container { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        .contact-card { background: white; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow); cursor: pointer; border: 1px solid transparent; }
        .contact-card:active { transform: scale(0.98); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #e0e7ff; color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .c-info { flex: 1; }
        .c-info h4 { font-size: 14px; margin-bottom: 2px; }
        .c-info p { font-size: 11px; color: var(--light-text); }
        .due-badge { text-align: right; }
        .due-val { font-size: 14px; font-weight: 800; }

        /* Profile Details */
        .profile-hero { background: white; margin: 15px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: var(--shadow); }
        .profile-hero .avatar { width: 70px; height: 70px; margin: 0 auto 10px; font-size: 30px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #f8fafc; padding: 10px; border-radius: 12px; }
        .stat-box small { font-size: 10px; color: var(--light-text); text-transform: uppercase; }
        .stat-box div { font-size: 16px; font-weight: 800; }

        /* Statement List */
        .section-title { padding: 0 20px; font-size: 14px; font-weight: 700; margin: 15px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .ledger-card { background: white; margin: 0 15px 10px; padding: 12px; border-radius: 12px; border-left: 4px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .ledger-card.in { border-left-color: var(--success); }
        .ledger-card.out { border-left-color: var(--danger); }
        .l-info h5 { font-size: 13px; margin-bottom: 2px; }
        .l-info small { font-size: 10px; color: var(--light-text); }
        .l-amt { text-align: right; font-weight: 700; font-size: 14px; }

        /* Filter & PDF Footer */
        .filter-bar { display: flex; gap: 5px; margin: 0 15px 15px; }
        .filter-bar input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 11px; }
        .btn-pdf { background: var(--text); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="view-list" class="view active">
        <div class="app-header">
            <div class="header-top">
                <a href="home.html"><i class="fas fa-arrow-left"></i></a>
                <span>Due Book (বাকি খাতা)</span>
            </div>
        </div>

        <div class="tab-container">
            <div class="tab active" onclick="switchTab('customers', this)">Customer</div>
            <div class="tab" onclick="switchTab('suppliers', this)">Supplier</div>
            <div class="tab" onclick="switchTab('staffs', this)">Staff</div>
        </div>

        <div class="search-area">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="contactSearch" placeholder="Search by name..." oninput="filterContacts()">
            </div>
        </div>

        <div class="list-container" id="contactList">
            <p style="text-align:center; padding:20px; color:var(--light-text);">Loading accounts...</p>
        </div>
    </div>

    <div id="view-profile" class="view">
        <div class="app-header">
            <div class="header-top">
                <i class="fas fa-arrow-left" onclick="showView('view-list')"></i>
                <span id="profileTitle">Account Profile</span>
            </div>
        </div>

        <div class="profile-hero">
            <div class="avatar" id="pAvatar">A</div>
            <h3 id="pName">User Name</h3>
            <p id="pPhone" style="font-size: 12px; color: var(--light-text);">017XXXXXXXX</p>
            <div class="stats-grid">
                <div class="stat-box">
                    <small>Total Bill</small>
                    <div id="pTotalBill">৳0</div>
                </div>
                <div class="stat-box">
                    <small style="color:var(--danger)">Total Due</small>
                    <div id="pTotalDue" style="color:var(--danger)">৳0</div>
                </div>
            </div>
        </div>

        <div class="section-title">
            <span>Statement History</span>
            <button class="btn-pdf" onclick="generateStatementPDF()"><i class="fas fa-file-pdf"></i> Download</button>
        </div>

        <div class="filter-bar">
            <input type="date" id="dateFrom">
            <input type="date" id="dateTo">
            <button class="btn-pdf" style="background:var(--primary)" onclick="loadProfileHistory()"><i class="fas fa-search"></i></button>
        </div>

        <div id="historyList">
            </div>
    </div>

    <script type="module">
        import { rtdb, ref, onValue, get } from './firebase_config.js';

        const SHOP_ID = localStorage.getItem('activeShopId');
        let currentTab = 'customers';
        let contacts = { customers: [], suppliers: [], staffs: [] };
        let activeContact = null;

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateFrom').value = today;
            document.getElementById('dateTo').value = today;
            fetchAllData();
        };

        // --- DATA FETCHING ---
        async function fetchAllData() {
            const types = ['customers', 'suppliers', 'staffs'];
            types.forEach(type => {
                onValue(ref(rtdb, `contacts/${type}`), (snap) => {
                    contacts[type] = [];
                    if (snap.exists()) {
                        Object.entries(snap.val()).forEach(([id, val]) => {
                            if (val.shop_id === SHOP_ID) contacts[type].push({ id, ...val });
                        });
                    }
                    if(type === currentTab) renderContactList();
                });
            });
        }

        window.switchTab = (tab, el) => {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderContactList();
        };

        function renderContactList() {
            const container = document.getElementById('contactList');
            container.innerHTML = '';
            const list = contacts[currentTab];

            if(list.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:50px; color:var(--light-text);">No ${currentTab} found.</p>`;
                return;
            }

            list.forEach(c => {
                const due = Number(c.due || 0);
                const html = `
                <div class="contact-card" onclick="openProfile('${c.id}', '${currentTab}')">
                    <div class="avatar">${c.name.charAt(0)}</div>
                    <div class="c-info">
                        <h4>${c.name}</h4>
                        <p>${c.phone || 'No phone'}</p>
                    </div>
                    <div class="due-badge">
                        <div class="due-val" style="color:${due > 0 ? 'var(--danger)' : 'var(--success)'}">৳${due}</div>
                        <small style="font-size:9px; font-weight:700; text-transform:uppercase;">Current Due</small>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // --- PROFILE LOGIC ---
        window.openProfile = async (id, type) => {
            const contact = contacts[type].find(c => c.id === id);
            if(!contact) return;
            activeContact = contact;
            activeContact.type = type;

            document.getElementById('pName').innerText = contact.name;
            document.getElementById('pPhone').innerText = contact.phone || 'N/A';
            document.getElementById('pAvatar').innerText = contact.name.charAt(0);
            document.getElementById('pTotalDue').innerText = `৳${contact.due || 0}`;

            showView('view-profile');
            loadProfileHistory();
        };

        window.loadProfileHistory = async () => {
            const historyContainer = document.getElementById('historyList');
            historyContainer.innerHTML = '<p style="text-align:center; padding:20px;">Fetching records...</p>';
            
            const from = new Date(document.getElementById('dateFrom').value).setHours(0,0,0,0);
            const to = new Date(document.getElementById('dateTo').value).setHours(23,59,59,999);
            
            let combinedHistory = [];

            // 1. Fetch Sales/Purchase history for this person
            const historyPath = activeContact.type === 'suppliers' ? 'purchase_history' : 'sales_history';
            const historySnap = await get(ref(rtdb, historyPath));
            
            if(historySnap.exists()){
                Object.values(historySnap.val()).forEach(h => {
                    const hDate = new Date(h.date || h.created_at).getTime();
                    // Match by customer name or supplier name
                    const nameMatch = (h.customer === activeContact.name || h.supplier === activeContact.name);
                    if(h.shop_id === SHOP_ID && nameMatch && hDate >= from && hDate <= to) {
                        combinedHistory.push({
                            type: 'invoice',
                            title: `Invoice: ${h.invoice_no || h.challan_no}`,
                            date: hDate,
                            total: h.total_amount,
                            paid: h.paid_amount,
                            due: h.due_amount,
                            items: h.items
                        });
                    }
                });
            }

            // 2. Fetch manual due adjustments
            const adjSnap = await get(ref(rtdb, 'due_history'));
            if(adjSnap.exists()){
                Object.values(adjSnap.val()).forEach(a => {
                    if(a.contact_id === activeContact.id && a.date >= from && a.date <= to){
                        combinedHistory.push({
                            type: 'payment',
                            title: a.action === 'receive' || a.action === 'pay' ? 'Payment Received' : 'Due Added',
                            date: a.date,
                            amt: a.amount,
                            note: a.note
                        });
                    }
                });
            }

            combinedHistory.sort((a, b) => b.date - a.date);
            renderHistory(combinedHistory);
        };

        function renderHistory(history) {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            
            if(history.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px; color:var(--light-text);">No transactions in this period.</p>';
                return;
            }

            history.forEach(h => {
                const dateStr = new Date(h.date).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'2-digit'});
                let html = '';

                if(h.type === 'invoice') {
                    html = `
                    <div class="ledger-card out">
                        <div class="l-info">
                            <h5>${h.title}</h5>
                            <small>${dateStr} • Bill: ৳${h.total} • Paid: ৳${h.paid}</small>
                        </div>
                        <div class="l-amt" style="color:var(--danger)">
                            +৳${h.due}<br><small>Due</small>
                        </div>
                    </div>`;
                } else {
                    const isRecv = h.title.includes('Received') || h.title.includes('Paid');
                    html = `
                    <div class="ledger-card ${isRecv ? 'in' : 'out'}">
                        <div class="l-info">
                            <h5>${h.title}</h5>
                            <small>${dateStr} ${h.note ? '• '+h.note : ''}</small>
                        </div>
                        <div class="l-amt" style="color:${isRecv ? 'var(--success)' : 'var(--danger)'}">
                            ${isRecv ? '-' : '+'}৳${h.amt}<br><small>${isRecv ? 'Reduced' : 'Added'}</small>
                        </div>
                    </div>`;
                }
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // --- PDF GENERATION ---
        window.generateStatementPDF = () => {
            const temp = document.createElement('div');
            temp.style.padding = '30px';
            temp.style.fontFamily = "'Hind Siliguri', sans-serif";
            
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            const shopName = localStorage.getItem('activeShopName') || 'Stashio Store';

            let rows = '';
            document.querySelectorAll('#historyList .ledger-card').forEach(card => {
                const title = card.querySelector('h5').innerText;
                const details = card.querySelector('small').innerText;
                const amt = card.querySelector('.l-amt').innerText.split('\n')[0];
                rows += `<tr>
                    <td style="padding:10px; border:1px solid #ddd;">${title}<br><small>${details}</small></td>
                    <td style="padding:10px; border:1px solid #ddd; text-align:right; font-weight:bold;">${amt}</td>
                </tr>`;
            });

            temp.innerHTML = `
                <h1 style="text-align:center; margin-bottom:5px;">${shopName}</h1>
                <p style="text-align:center; color:#666; margin-bottom:20px;">Account Statement (বাকি খাতা রিপোর্ট)</p>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; border-bottom:2px solid #eee; padding-bottom:10px;">
                    <div><strong>Name:</strong> ${activeContact.name}<br><strong>Phone:</strong> ${activeContact.phone || 'N/A'}</div>
                    <div style="text-align:right;"><strong>Period:</strong> ${from} to ${to}<br><strong>Current Due:</strong> ৳${activeContact.due}</div>
                </div>
                <table style="width:100%; border-collapse:collapse;">
                    <thead><tr style="background:#4F46E5; color:white;"><th style="padding:10px; text-align:left;">Transaction Detail</th><th style="padding:10px; text-align:right;">Amount</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <p style="text-align:center; margin-top:30px; font-size:10px; color:#999;">Generated by Stashio Management App</p>
            `;

            html2pdf().from(temp).set({
                margin: 10, filename: `${activeContact.name}_Statement.pdf`,
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        };

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.filterContacts = () => {
            const term = document.getElementById('contactSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.contact-card');
            cards.forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        };

    </script>
</body>
</html>
