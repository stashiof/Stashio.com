<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Due Ledger and History - Stashio</title>
    
    <meta name="theme-color" content="#4F46E5">

    <script>
        const loggedInUser = localStorage.getItem('tempUserPhone') || sessionStorage.getItem('tempUserPhone') || localStorage.getItem('userPhone');
        const activeShopId = localStorage.getItem('activeShopId');
        
        if (!loggedInUser) {
            window.location.replace("index.html");
        } else if (!activeShopId) {
            window.location.replace("dashboard.html");
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --secondary: #ec4899; --bg-color: #f3f4f6;
            --white: #ffffff; --text-dark: #1f2937; --text-light: #6b7280;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --border-radius: 16px; --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-color); color: var(--text-dark); overflow-x: hidden; padding-bottom: 30px; position: relative; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Dynamic Header Area */
        .app-header {
            position: relative; padding: 20px 20px 45px 20px; color: white; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; 
            z-index: 50; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
            overflow: hidden;
        }
        .header-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); z-index: 1; }
        #dynamicThemeContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; overflow: hidden; }
        
        .header-top { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-title { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 700; }
        .header-title a { color: white; text-decoration: none; }
        .btn-pdf { background: rgba(255,255,255,0.2); border: none; padding: 8px 12px; border-radius: 10px; color: white; font-size: 12px; font-weight: 600; cursor: pointer; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-pdf:active { transform: scale(0.95); }

        /* Tabs */
        .tab-container { display: flex; justify-content: space-around; padding: 10px 15px; background: var(--white); margin: -25px 15px 15px; border-radius: 16px; box-shadow: var(--shadow); position: relative; z-index: 60; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Filter Section */
        .filter-card { background: var(--white); border-radius: 16px; padding: 15px; margin: 0 15px 15px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px; border: 1px solid #f8fafc; }
        .date-row { display: flex; gap: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 10px; font-weight: 700; color: var(--text-light); margin-bottom: 3px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #e5e7eb; border-radius: 12px; font-size: 13px; font-family: inherit; outline: none; background: #f8fafc; color: var(--text-dark); transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); background: white; }
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 10px; border: 1px solid #e5e7eb; outline: none; font-size: 13px; font-family: inherit; background: #f8fafc; }
        
        /* Summary */
        .summary-bar { display: flex; justify-content: space-between; padding: 0 15px; margin-bottom: 15px; gap: 10px; }
        .sum-box { flex: 1; background: var(--white); padding: 15px; border-radius: 14px; text-align: center; box-shadow: var(--shadow); border-top: 3px solid transparent; border-left: 1px solid #f8fafc; border-right: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; }
        .sum-box.recv { border-top-color: var(--success); }
        .sum-box.pay { border-top-color: var(--danger); }
        .sum-title { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        .sum-val { font-size: 18px; font-weight: 800; margin-top: 4px; }

        /* List */
        .due-list { padding: 0 15px; display: flex; flex-direction: column; gap: 12px; }
        .due-card { background: var(--white); border-radius: 14px; padding: 15px; box-shadow: var(--shadow); position: relative; overflow: hidden; border-left: 4px solid transparent; border-top: 1px solid #f8fafc; border-right: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; }
        .due-card.receive { border-left-color: var(--success); }
        .due-card.pay { border-left-color: var(--danger); }
        
        .dc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; border-bottom: 1px dashed #e5e7eb; padding-bottom: 10px; }
        .dc-name { font-size: 14px; font-weight: 700; color: var(--text-dark); }
        .dc-type { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
        .type-recv { background: #dcfce3; color: var(--success); }
        .type-pay { background: #fee2e2; color: var(--danger); }

        .dc-body { display: flex; justify-content: space-between; align-items: center; }
        .dc-total { font-size: 11px; color: var(--text-light); font-weight: 600; }
        .dc-due-amt { font-size: 18px; font-weight: 800; color: var(--text-dark); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; border: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-update { background: var(--primary); color: white; }
        .btn-history { background: #f8fafc; color: var(--text-dark); border: 1px solid #e5e7eb; }
        .btn-action:active { transform: scale(0.96); }

        /* History List */
        .history-list { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        .history-card { background: var(--white); border-radius: 14px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border-left: 4px solid transparent; }
        .history-card.in { border-left-color: var(--success); }
        .history-card.out { border-left-color: var(--danger); }
        
        .hc-info { flex: 1; min-width: 0; }
        .hc-name { font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 2px; }
        .hc-note { font-size: 11px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .hc-date { font-size: 10px; color: #9ca3af; margin-top: 4px; font-weight: 600; }
        
        .hc-amt-box { text-align: right; }
        .hc-amt { font-size: 16px; font-weight: 800; }
        .hc-bal { font-size: 10px; color: var(--text-light); font-weight: 600; margin-top: 2px; }
        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(3px); }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 16px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .btn-close { background: white; border: 1px solid #e5e7eb; width: 30px; height: 30px; border-radius: 50%; color: var(--text-light); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .btn-close:active { background: #f1f5f9; }
        
        /* Timeline */
        .timeline { position: relative; padding-left: 20px; }
        .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: #e5e7eb; }
        .tl-item { position: relative; margin-bottom: 15px; }
        .tl-dot { position: absolute; left: -21px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); border: 2px solid white; box-shadow: 0 0 0 2px var(--primary); }
        .tl-content { background: #f8fafc; padding: 10px 12px; border-radius: 10px; border: 1px solid #f1f5f9; }

        .btn-submit { width: 100%; background: var(--success); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="app-header" id="header-container">
        <div class="header-bg"></div>
        <div id="dynamicThemeContainer"></div>
        <div class="header-top">
            <div class="header-title">
                <a href="home.html"><i class="fas fa-arrow-left"></i></a>
                <span>Due Ledger and History</span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="downloadDuePDF()" class="btn-pdf" id="btnDuePdf"><i class="fas fa-file-pdf"></i> Due PDF</button>
                <button onclick="downloadHistoryPDF()" class="btn-pdf" id="btnHistoryPdf"><i class="fas fa-file-pdf"></i> History PDF</button>
            </div>
        </div>
    </div>

    <div class="tab-container">
        <div class="tab-btn active" onclick="switchTab('customers')">Customers</div>
        <div class="tab-btn" onclick="switchTab('suppliers')">Suppliers</div>
        <div class="tab-btn" onclick="switchTab('staff')">Staff</div>
    </div>

    <div class="summary-bar">
        <div class="sum-box recv">
            <div class="sum-title text-success">To Receive (পাব)</div>
            <div class="sum-val text-success" id="sumRecv">৳0</div>
        </div>
        <div class="sum-box pay">
            <div class="sum-title text-danger">To Pay (দিব)</div>
            <div class="sum-val text-danger" id="sumPay">৳0</div>
        </div>
    </div>

    <div class="filter-card">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchName" placeholder="🔍 Search Name...">
        </div>
        <div class="date-row">
            <div class="input-group" style="margin: 0;">
                <label>From Date</label>
                <input type="date" id="dateFrom">
            </div>
            <div class="input-group" style="margin: 0;">
                <label>To Date</label>
                <input type="date" id="dateTo">
            </div>
        </div>
    </div>

    <div id="loading" style="text-align: center; padding: 40px; color: var(--text-light); font-weight: 600; font-size: 13px;">
        <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary); margin-bottom: 10px;"></i><br>Loading Ledger...
    </div>

    <div class="due-list" id="dueList"></div>

    <h3 style="padding: 15px; font-size: 16px; font-weight: 700; margin-top: 20px;">Transaction History</h3>
    <div class="history-list" id="historyList"></div>

    <div class="modal-overlay" id="payModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="font-size: 15px; font-weight: 700; margin: 0;" id="payTitle">Update Payment</h3>
                <button onclick="closeModal('payModal')" class="btn-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="payForm">
                    <input type="hidden" id="payDueId">
                    <input type="hidden" id="payDueType">
                    <input type="hidden" id="payDueName">
                    <input type="hidden" id="payCurrentAmt">

                    <div style="text-align: center; margin-bottom: 20px;">
                        <p style="font-size: 12px; color: var(--text-light); margin-bottom: 5px;">Current Due</p>
                        <h2 style="font-size: 24px; color: var(--text-dark); margin: 0;" id="payDisplayAmt">৳0</h2>
                    </div>

                    <div class="input-group" style="margin-bottom: 15px;">
                        <label id="payInputLabel">Amount to Update (৳)</label>
                        <input type="number" id="payAmount" required style="font-size: 16px; font-weight: bold; border-color: var(--primary); text-align: center;">
                    </div>

                    <button type="submit" class="btn-submit" id="paySubmitBtn">Confirm Update</button>
                </form>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="font-size: 15px; font-weight: 700; margin: 0;">Transaction History</h3>
                <button onclick="closeModal('historyModal')" class="btn-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <button onclick="downloadSpecificHistoryPDF()" class="btn-pdf" style="margin-bottom: 15px; width: 100%; background: var(--primary); color: white; border: none;">Download PDF</button>
                <div class="timeline" id="historyTimeline"></div>
            </div>
        </div>
    </div>


    <script type="module">
        // Import from firebase_config.js
        import { rtdb, ref as rtdbRef, onValue as rtdbOnValue, push, update } from './firebase_config.js';
        import { runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const SHOP_ID = localStorage.getItem('activeShopId');
        const SHOP_NAME = localStorage.getItem('activeShopName') || 'Stashio Store';

        let allDues = [];
        let allHistory = [];
        let allContacts = { customers: [], suppliers: [], staff: [] };
        let globalPdfTemplateCode = "";
        let filteredHistory = [];
        let currentTab = 'customers';
        let specificHistory = [];

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateFrom').value = today;
            document.getElementById('dateTo').value = today;

            // Theme sync
            rtdbOnValue(rtdbRef(rtdb, `global_settings/header_theme`), (snap) => {
                const themeCode = snap.val()?.code || '';
                document.getElementById('dynamicThemeContainer').innerHTML = themeCode;
                document.body.classList.toggle('has-theme', !!themeCode.trim());
            });

            // Load PDF Template
            rtdbOnValue(rtdbRef(rtdb, `global_settings/pdf_due_template`), (snap) => {
                globalPdfTemplateCode = snap.val()?.code || '';
            });

            // Load Contacts
            rtdbOnValue(rtdbRef(rtdb, 'contacts'), (snap) => {
                allContacts = { customers: [], suppliers: [], staff: [] };
                if (snap.exists()) {
                    const data = snap.val();
                    if (data.customers) allContacts.customers = Object.values(data.customers).filter(c => c.shop_id === SHOP_ID);
                    if (data.suppliers) allContacts.suppliers = Object.values(data.suppliers).filter(c => c.shop_id === SHOP_ID);
                    if (data.staff) allContacts.staff = Object.values(data.staff).filter(c => c.shop_id === SHOP_ID);
                }
                renderDues();
            });

            // Load History Data
            rtdbOnValue(rtdbRef(rtdb, 'due_history'), (snap) => {
                allHistory = snap.exists() ? Object.entries(snap.val()).map(([id, val]) => ({ id, ...val })).reverse() : [];
                applyFilters();
            });

            // Load Main Due Book
            rtdbOnValue(rtdbRef(rtdb, 'due_book'), (snap) => {
                document.getElementById('loading').style.display = 'none';
                allDues = snap.exists() ? Object.entries(snap.val()).map(([id, val]) => ({ id, ...val })).filter(d => d.shop_id === SHOP_ID) : [];
                localStorage.setItem(`due_book_${SHOP_ID}`, JSON.stringify(allDues));
                renderDues();
            });
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            renderDues();
        };

        // Real-time Search and Date Filter
        document.getElementById('searchName').addEventListener('input', () => { renderDues(); applyFilters(); });
        document.getElementById('dateFrom').addEventListener('change', applyFilters);
        document.getElementById('dateTo').addEventListener('change', applyFilters);

        function renderDues() {
            const listEl = document.getElementById('dueList');
            const searchTerm = document.getElementById('searchName').value.toLowerCase().trim();
            listEl.innerHTML = '';

            let totalRecv = 0;
            let totalPay = 0;

            const dueMap = new Map();
            allDues.forEach(d => dueMap.set(d.name.toLowerCase(), d));

            let contacts = [];
            if (currentTab === 'customers') contacts = allContacts.customers;
            else if (currentTab === 'suppliers') contacts = allContacts.suppliers;
            else if (currentTab === 'staff') contacts = allContacts.staff;

            let filteredContacts = contacts.filter(c => c.name.toLowerCase().includes(searchTerm));

            if (filteredContacts.length === 0) {
                listEl.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-light); font-weight: 600;"><i class="fas fa-book-open" style="font-size: 40px; color: #cbd5e1; margin-bottom: 10px;"></i><br>No contacts found.</div>`;
            } else {
                filteredContacts.forEach(c => {
                    const nameLow = c.name.toLowerCase();
                    const d = dueMap.get(nameLow) || { id: null, current_due: 0, total_amount: 0, type: currentTab === 'customers' ? 'receive' : 'pay' };
                    const type = d.type || (currentTab === 'customers' ? 'receive' : 'pay');

                    if (type === 'receive') totalRecv += Number(d.current_due);
                    else totalPay += Number(d.current_due);

                    const isRecv = type === 'receive';
                    const typeLabel = isRecv ? 'Receive (পাব)' : 'Pay (দিব)';
                    const typeClass = isRecv ? 'type-recv' : 'type-pay';
                    const cardClass = isRecv ? 'receive' : 'pay';
                    const btnColor = isRecv ? 'var(--success)' : 'var(--danger)';

                    const html = `
                    <div class="due-card ${cardClass}">
                        <div class="dc-header">
                            <div class="dc-name">${c.name || 'Unknown'}</div>
                            <div class="dc-type ${typeClass}">${typeLabel}</div>
                        </div>
                        <div class="dc-body">
                            <div class="dc-total">Total Bill: ৳${Number(d.total_amount || 0).toLocaleString()}</div>
                            <div class="dc-due-amt" style="color:${btnColor}">৳${Number(d.current_due).toLocaleString()}</div>
                        </div>
                        <div class="btn-group">
                            <button onclick="openHistory('${d.id || ''}', '${c.name}')" class="btn-action btn-history"><i class="fas fa-history"></i> History</button>
                            <button onclick="openPayModal('${d.id || ''}', '${type}', '${c.name.replace(/'/g, "\\'")}', ${d.current_due})" class="btn-action btn-update" style="background:${btnColor}">
                                <i class="fas ${isRecv ? 'fa-hand-holding-usd' : 'fa-money-bill-wave'}"></i> Update
                            </button>
                        </div>
                    </div>`;
                    listEl.insertAdjacentHTML('beforeend', html);
                });
            }

            // Update summary with overall, not filtered
            let overallRecv = 0, overallPay = 0;
            [...allContacts.customers, ...allContacts.suppliers, ...allContacts.staff].forEach(c => {
                const d = dueMap.get(c.name.toLowerCase()) || { current_due: 0, type: currentTab === 'customers' ? 'receive' : 'pay' };
                if (d.type === 'receive') overallRecv += Number(d.current_due);
                else overallPay += Number(d.current_due);
            });
            document.getElementById('sumRecv').innerText = `৳${overallRecv.toLocaleString()}`;
            document.getElementById('sumPay').innerText = `৳${overallPay.toLocaleString()}`;
        }

        window.applyFilters = () => {
            const term = document.getElementById('searchName').value.toLowerCase().trim();
            const dateFrom = new Date(document.getElementById('dateFrom').value).setHours(0,0,0,0);
            const dateTo = new Date(document.getElementById('dateTo').value).setHours(23,59,59,999);

            filteredHistory = allHistory.filter(h => {
                const matchName = h.name.toLowerCase().includes(term);
                const hDate = new Date(h.date).getTime();
                const matchDate = hDate >= dateFrom && hDate <= dateTo;
                return matchName && matchDate;
            });

            renderHistory();
        };

        function renderHistory() {
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = '';

            if (filteredHistory.length === 0) {
                listEl.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-light); font-weight: 600;">No records found.</div>`;
                return;
            }

            filteredHistory.forEach(h => {
                const d = new Date(h.date);
                const isPositive = h.type === 'receive' ? h.action.includes('Received') : !h.action.includes('Paid');
                const cardClass = isPositive ? 'in' : 'out';
                const textClass = isPositive ? 'text-green' : 'text-red';
                const sign = isPositive ? '+' : '-';

                const html = `
                <div class="history-card ${cardClass}">
                    <div class="hc-info">
                        <div class="hc-name">${h.name}</div>
                        <div class="hc-note">${h.action}</div>
                        <div class="hc-date">${d.toLocaleDateString('en-GB')} ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                    <div class="hc-amt-box">
                        <div class="hc-amt ${textClass}">${sign}৳${Number(h.amount).toLocaleString()}</div>
                        <div class="hc-bal">Bal: ৳${h.balance_left !== undefined ? Number(h.balance_left).toLocaleString() : 'N/A'}</div>
                    </div>
                </div>`;
                listEl.insertAdjacentHTML('beforeend', html);
            });
        }

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        // Payment Modal
        window.openPayModal = (id, type, name, currentAmt) => {
            document.getElementById('payDueId').value = id;
            document.getElementById('payDueType').value = type;
            document.getElementById('payDueName').value = name;
            document.getElementById('payCurrentAmt').value = currentAmt;
            
            document.getElementById('payTitle').innerText = type === 'receive' ? `Receive from ${name}` : `Pay to ${name}`;
            document.getElementById('payInputLabel').innerText = type === 'receive' ? 'Amount Received (৳)' : 'Amount Paid (৳)';
            document.getElementById('payDisplayAmt').innerText = `৳${currentAmt.toLocaleString()}`;
            document.getElementById('payAmount').value = '';

            document.getElementById('payModal').style.display = 'flex';
        };

        document.getElementById('payForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('paySubmitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            let id = document.getElementById('payDueId').value;
            const type = document.getElementById('payDueType').value;
            const name = document.getElementById('payDueName').value;
            const currentAmt = Number(document.getElementById('payCurrentAmt').value);
            const payAmt = Number(document.getElementById('payAmount').value);

            if (payAmt <= 0 || payAmt > currentAmt) {
                alert("Invalid amount! Cannot be more than current due.");
                btn.innerHTML = originalText; btn.disabled = false; return;
            }

            const newDue = currentAmt - payAmt;
            const actionText = type === 'receive' ? 'Received' : 'Paid';

            try {
                if (!id) {
                    const newDueRef = push(rtdbRef(rtdb, 'due_book'));
                    id = newDueRef.key;
                }
                await update(rtdbRef(rtdb, `due_book/${id}`), { 
                    shop_id: SHOP_ID,
                    name: name,
                    type: type,
                    current_due: newDue,
                    total_amount: currentAmt, 
                    updated_at: Date.now() 
                });

                await push(rtdbRef(rtdb, 'due_history'), {
                    due_id: id, shop_id: SHOP_ID, name: name, type: type,
                    action: actionText, amount: payAmt, balance_left: newDue, date: Date.now()
                });

                const cashType = type === 'receive' ? 'cash_in' : 'cash_out';
                const modifier = type === 'receive' ? payAmt : -payAmt;

                await runTransaction(rtdbRef(rtdb, `cash_settings/${SHOP_ID}/current_balance`), (bal) => (bal || 0) + modifier);
                
                await push(rtdbRef(rtdb, 'cash_transactions'), {
                    shop_id: SHOP_ID, type: cashType, source: 'due_ledger',
                    amount: payAmt, note: `Due ${actionText}: ${name}`, created_at: Date.now()
                });

                closeModal('payModal');

            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.innerHTML = originalText; btn.disabled = false;
            }
        });

        // History Modal
        window.openHistory = (id, name) => {
            const tl = document.getElementById('historyTimeline');
            tl.innerHTML = '';
            
            specificHistory = allHistory.filter(h => h.due_id === id);
            
            if (specificHistory.length === 0) {
                tl.innerHTML = '<p style="text-align:center; color:#9ca3af; padding: 20px;">No transaction records found.</p>';
            } else {
                specificHistory.forEach(h => {
                    const d = new Date(h.date);
                    const color = h.type === 'receive' ? (h.action === 'Received' ? 'green' : 'blue') : (h.action === 'Paid' ? 'red' : 'blue');

                    tl.innerHTML += `
                        <div class="tl-item">
                            <div class="tl-dot"></div>
                            <div class="tl-content">
                                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                    <strong style="font-size:12px; color:var(--text-dark);">${h.action}</strong>
                                    <span style="font-size:10px; color:#9ca3af;">${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                                </div>
                                <div style="display:flex; justify-content:space-between; font-size:12px;">
                                    <span style="color:${color}; font-weight:bold;">৳${Number(h.amount).toLocaleString()}</span>
                                    <span style="color:#6b7280; font-weight: 600;">Bal: ৳${h.balance_left !== undefined ? Number(h.balance_left).toLocaleString() : '-'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('historyModal').querySelector('h3').innerText = `History for ${name}`;
            document.getElementById('historyModal').style.display = 'flex';
        };

        // Download Specific History PDF
        window.downloadSpecificHistoryPDF = () => {
            if (specificHistory.length === 0) { alert("No history to download!"); return; }
            
            const tempDiv = document.createElement('div');
            tempDiv.style.padding = '20px';
            tempDiv.style.fontFamily = "'Hind Siliguri', sans-serif";
            
            let trs = '';
            specificHistory.forEach(h => {
                const d = new Date(h.date).toLocaleDateString('en-GB');
                trs += `<tr>
                    <td style="padding: 8px; border: 1px solid #ddd;">${d}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; font-weight:bold;">${h.name}</td>
                    <td style="padding: 8px; border: 1px solid #ddd;">${h.action}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align:right; font-weight:bold;">${Number(h.amount).toLocaleString()}</td>
                </tr>`;
            });

            tempDiv.innerHTML = `
                <h2 style="text-align:center; margin-bottom: 5px;">${SHOP_NAME}</h2>
                <p style="text-align:center; font-size: 14px; margin-bottom: 20px;">Specific Due History for ${specificHistory[0].name}</p>
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 12px;">
                    <thead style="background-color: #4F46E5; color: white;">
                        <tr>
                            <th style="padding: 8px; border: 1px solid #ddd;">Date</th>
                            <th style="padding: 8px; border: 1px solid #ddd;">Party Name</th>
                            <th style="padding: 8px; border: 1px solid #ddd;">Action</th>
                            <th style="padding: 8px; border: 1px solid #ddd; text-align:right;">Amount (৳)</th>
                        </tr>
                    </thead>
                    <tbody>${trs}</tbody>
                </table>
            `;
            
            html2pdf().set({
                margin: 10, filename: `Due_History_${specificHistory[0].name}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(tempDiv).save();
        };

        // Download Due PDF (similar to previous)
        window.downloadDuePDF = () => {
            // Implement as before, but filter by currentTab if needed
            const searchTerm = document.getElementById('searchName').value.trim();
            const dateStr = new Date().toLocaleDateString('en-GB');

            const dueMap = new Map();
            allDues.forEach(d => dueMap.set(d.name.toLowerCase(), d));

            let contacts = [];
            if (currentTab === 'customers') contacts = allContacts.customers;
            else if (currentTab === 'suppliers') contacts = allContacts.suppliers;
            else if (currentTab === 'staff') contacts = allContacts.staff;

            let listToPrint = contacts.map(c => {
                const d = dueMap.get(c.name.toLowerCase()) || { current_due: 0, total_amount: 0, created_at: Date.now(), type: currentTab === 'customers' ? 'receive' : 'pay' };
                return { ...d, name: c.name };
            });

            if (searchTerm) listToPrint = listToPrint.filter(d => d.name.toLowerCase().includes(searchTerm.toLowerCase()));

            if (listToPrint.length === 0) { alert("No records to generate PDF!"); return; }

            let rowsHtml = '';
            let sumR = 0, sumP = 0;
            
            listToPrint.forEach(d => {
                if (d.type === 'receive') sumR += Number(d.current_due);
                else sumP += Number(d.current_due);

                const cDate = new Date(d.created_at).toLocaleDateString('en-GB');
                const typeTxt = d.type === 'receive' ? '<span style="color:green; font-weight:bold;">Receive</span>' : '<span style="color:red; font-weight:bold;">Pay</span>';

                rowsHtml += `
                    <tr>
                        <td style="padding: 10px; border: 1px solid #ddd;">${cDate}</td>
                        <td style="padding: 10px; border: 1px solid #ddd; font-weight:600;">${d.name || 'Unknown'}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${typeTxt}</td>
                        <td style="padding: 10px; border: 1px solid #ddd; text-align:right;">৳${Number(d.total_amount).toLocaleString()}</td>
                        <td style="padding: 10px; border: 1px solid #ddd; text-align:right; font-weight:bold;">৳${Number(d.current_due).toLocaleString()}</td>
                    </tr>
                `;
            });

            const defaultTemplate = `
                <div style="font-family: 'Hind Siliguri', sans-serif; padding: 20px;">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <h2 style="font-size: 24px; margin-bottom: 5px; color: #1f2937;">${SHOP_NAME}</h2>
                        <p style="font-size: 14px; color: #6b7280; margin: 0;">Due Ledger Report (বকেয়া খাতা) - ${currentTab.charAt(0).toUpperCase() + currentTab.slice(1)}</p>
                        <p style="font-size: 12px; font-weight: bold; margin-top: 5px;">Date: ${dateStr} | ${searchTerm ? 'Filtered: '+searchTerm : 'All'}</p>
                    </div>
                    <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 12px;">
                        <thead style="background-color: #4F46E5; color: white;">
                            <tr>
                                <th style="padding: 10px; border: 1px solid #ddd;">Created Date</th>
                                <th style="padding: 10px; border: 1px solid #ddd;">Name</th>
                                <th style="padding: 10px; border: 1px solid #ddd;">Type</th>
                                <th style="padding: 10px; border: 1px solid #ddd; text-align:right;">Total Bill</th>
                                <th style="padding: 10px; border: 1px solid #ddd; text-align:right;">Current Due</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                    <div style="margin-top:20px; display:flex; justify-content:flex-end;">
                        <div style="width:250px; background:#f9fafb; padding:15px; border-radius:8px; border:1px solid #ddd;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px; color:green; font-weight:bold;">
                                <span>Total Receivable:</span><span>৳${sumR.toLocaleString()}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; color:red; font-weight:bold;">
                                <span>Total Payable:</span><span>৳${sumP.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = globalPdfTemplateCode || defaultTemplate;

            html2pdf().set({
                margin: 10, filename: `Due_Ledger_${currentTab}_${dateStr.replace(/\//g, '-')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(tempDiv).save();
        };

        // Download Global History PDF
        window.downloadHistoryPDF = () => {
            if (filteredHistory.length === 0) { alert("No data to download!"); return; }
            
            const tempDiv = document.createElement('div');
            tempDiv.style.padding = '20px';
            tempDiv.style.fontFamily = "'Hind Siliguri', sans-serif";
            
            let trs = '';
            filteredHistory.forEach(h => {
                const d = new Date(h.date).toLocaleDateString('en-GB');
                trs += `<tr>
                    <td style="padding: 8px; border: 1px solid #ddd;">${d}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; font-weight:bold;">${h.name}</td>
                    <td style="padding: 8px; border: 1px solid #ddd;">${h.action}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align:right; font-weight:bold;">${Number(h.amount).toLocaleString()}</td>
                </tr>`;
            });

            tempDiv.innerHTML = `
                <h2 style="text-align:center; margin-bottom: 5px;">${SHOP_NAME}</h2>
                <p style="text-align:center; font-size: 14px; margin-bottom: 20px;">Due Ledger Transaction History</p>
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 12px;">
                    <thead style="background-color: #4F46E5; color: white;">
                        <tr>
                            <th style="padding: 8px; border: 1px solid #ddd;">Date</th>
                            <th style="padding: 8px; border: 1px solid #ddd;">Party Name</th>
                            <th style="padding: 8px; border: 1px solid #ddd;">Action</th>
                            <th style="padding: 8px; border: 1px solid #ddd; text-align:right;">Amount (৳)</th>
                        </tr>
                    </thead>
                    <tbody>${trs}</tbody>
                </table>
            `;
            
            html2pdf().set({
                margin: 10, filename: `Due_History_Report.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(tempDiv).save();
        };
    </script>
</body>
</html>
