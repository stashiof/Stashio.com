<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Ledger Book - Stashio</title>
    
    <meta name="theme-color" content="#4F46E5">

    <script>
        const loggedInUser = localStorage.getItem('tempUserPhone') || sessionStorage.getItem('tempUserPhone') || localStorage.getItem('userPhone');
        const activeShopId = localStorage.getItem('activeShopId');
        if (!loggedInUser || !activeShopId) window.location.replace("index.html");
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --secondary: #ec4899; --bg-color: #f3f4f6;
            --white: #ffffff; --text-dark: #1f2937; --text-light: #6b7280;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --border-radius: 16px; --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 30px; }

        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* App Header */
        .app-header { position: relative; padding: 20px 20px 40px 20px; color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; z-index: 50; }
        .header-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); z-index: 1; }
        #dynamicThemeContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; overflow: hidden; }
        .header-top { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .header-title { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 700; }
        .header-title a { color: white; text-decoration: none; }
        .btn-pdf-main { background: rgba(255,255,255,0.2); border: none; padding: 8px 12px; border-radius: 10px; color: white; font-size: 12px; font-weight: 600; cursor: pointer; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 5px; transition: 0.2s; }

        /* Filter Area */
        .filter-card { background: var(--white); border-radius: 16px; padding: 15px; margin: -20px 15px 15px 15px; box-shadow: var(--shadow); position: relative; z-index: 60; border: 1px solid #f8fafc; }
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px; border: 1px solid #e5e7eb; outline: none; font-size: 13px; background: #f8fafc; }

        /* Ledger List */
        .ledger-container { padding: 0 15px; display: flex; flex-direction: column; gap: 12px; }
        .contact-card { background: var(--white); border-radius: 14px; padding: 15px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #cbd5e1; cursor: pointer; }
        .contact-card.customer { border-left-color: var(--success); }
        .contact-card.supplier { border-left-color: var(--danger); }
        
        .cc-info { flex: 1; }
        .cc-name { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; }
        .cc-type { font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; padding: 2px 8px; background: #f1f5f9; border-radius: 6px; display: inline-block; }
        .cc-balance { text-align: right; }
        .cc-amt { font-size: 18px; font-weight: 800; line-height: 1.2; }
        .cc-status { font-size: 11px; font-weight: 600; color: var(--text-light); }

        /* Full Screen Ledger View */
        #ledgerView { display: none; position: fixed; inset: 0; background: var(--bg-color); z-index: 999; flex-direction: column; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .lv-header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10; }
        .btn-back { background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 10px; font-size: 16px; cursor: pointer; color: var(--text-dark); }
        .lv-title { font-size: 16px; font-weight: 700; text-align: center; flex: 1; }

        .lv-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        .stat-box { background: linear-gradient(135deg, var(--primary), #764ba2); padding: 20px; border-radius: 16px; color: white; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }
        .stat-box p { font-size: 12px; font-weight: 600; opacity: 0.8; margin-bottom: 5px; text-transform: uppercase; }
        .stat-box h2 { font-size: 32px; font-weight: 800; margin: 0; }

        /* Action Form */
        .action-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid #f8fafc; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .custom-input { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 13px; font-family: inherit; outline: none; background: #f8fafc; }
        .custom-input:focus { border-color: var(--primary); background: white; }
        .custom-textarea { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 13px; font-family: inherit; outline: none; background: #f8fafc; margin-bottom: 12px; resize: none; height: 80px; }
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        
        /* Chalan Cards */
        .chalan-card { background: white; border-radius: 14px; padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid #e5e7eb; border-left: 4px solid var(--warning); }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed #e5e7eb; padding-bottom: 8px; }
        .c-memo { font-weight: 700; font-size: 14px; color: var(--primary); }
        .c-date { font-size: 11px; color: var(--text-light); font-weight: 600; }
        .c-details { font-size: 13px; color: var(--text-dark); margin-bottom: 12px; white-space: pre-wrap; background: #f8fafc; padding: 10px; border-radius: 8px; }
        .c-stats { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
        .c-actions { display: flex; gap: 10px; }
        .btn-pay { flex: 1; background: var(--success); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-pdf { flex: 1; background: #f1f5f9; color: var(--primary); border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px; }

        /* Payment Modal */
        #paymentModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 350px; border-radius: 20px; padding: 20px; text-align: center; }
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancel { flex: 1; background: #f1f5f9; color: var(--text-dark); border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-confirm { flex: 1; background: var(--success); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }

    </style>
</head>
<body>

    <div id="mainView">
        <div class="app-header" id="header-container">
            <div class="header-bg"></div>
            <div id="dynamicThemeContainer"></div>
            <div class="header-top">
                <div class="header-title">
                    <a href="home.html"><i class="fas fa-arrow-left"></i></a>
                    <span>Ledger & Chalans</span>
                </div>
            </div>
        </div>

        <div class="filter-card">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search Customer..." oninput="renderList()">
            </div>
        </div>

        <div id="loading" style="text-align: center; padding: 40px; color: var(--text-light); font-weight: 600; font-size: 13px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary); margin-bottom: 10px;"></i><br>Syncing Chalans...
        </div>

        <div class="ledger-container" id="contactList"></div>
    </div>

    <div id="ledgerView">
        <div class="lv-header">
            <button class="btn-back" onclick="closeLedger()"><i class="fas fa-arrow-left"></i></button>
            <div class="lv-title" id="lvName">Name</div>
            <div style="width: 36px;"></div> </div>

        <div class="lv-content">
            <div class="stat-box">
                <p>Total Due Amount</p>
                <h2 id="lvBalance">৳0</h2>
                <div style="font-size: 12px; margin-top: 5px; opacity: 0.9;" id="lvTypeStatus"></div>
            </div>

            <div class="action-card">
                <h4 style="font-size: 14px; margin-bottom: 15px; color: var(--text-dark);"><i class="fas fa-file-invoice"></i> নতুন চালান তৈরি করুন</h4>
                
                <div class="input-grid">
                    <input type="text" id="cMemo" class="custom-input" placeholder="Memo/Chalan No" required>
                    <input type="date" id="cDate" class="custom-input" required>
                </div>
                
                <textarea id="cDetails" class="custom-textarea" placeholder="পণ্য ও পরিমাণের বিবরণ (যেমন: ৫টি কলম, ৩টি খাতা)" required></textarea>
                
                <input type="number" id="cAmount" class="custom-input" placeholder="Total Bill Amount (৳)" required step="any" style="margin-bottom: 12px;">
                
                <button class="btn-submit" id="btnSubmitChalan" onclick="submitChalan()">Create Chalan</button>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4 style="font-size: 14px; color: var(--text-dark); margin: 0;">অ্যাকটিভ চালানসমূহ (বকেয়া)</h4>
            </div>
            
            <div id="activeChalansContainer">
                </div>
        </div>
    </div>

    <div id="paymentModal">
        <div class="modal-content">
            <div class="modal-title">Payment for <span id="payMemoNo" style="color:var(--primary);"></span></div>
            <p style="font-size: 12px; color: var(--text-light); margin-bottom: 15px;">Due: ৳<span id="payDueAmt" style="font-weight:bold; color:var(--danger);"></span></p>
            
            <input type="number" id="payAmountInput" class="custom-input" placeholder="Enter Payment Amount (৳)">
            
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closePaymentModal()">Cancel</button>
                <button class="btn-confirm" id="btnConfirmPay" onclick="processPayment()">Save Payment</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { rtdb, ref, onValue, push, update, get } from './firebase_config.js';
        import { runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const SHOP_ID = localStorage.getItem('activeShopId');
        const SHOP_NAME = localStorage.getItem('activeShopName') || 'আল্লারদান স্টেশনারি';

        let mergedData = [];
        let allChalans = [];
        let currentContact = null;
        let selectedChalanId = null;

        window.onload = async () => {
            document.getElementById('cDate').valueAsDate = new Date();
            loadMasterData();
        };

        // Load DB
        function loadMasterData() {
            onValue(ref(rtdb, 'contacts'), (cSnap) => {
                onValue(ref(rtdb, 'due_book'), (dSnap) => {
                    onValue(ref(rtdb, 'due_chalans'), (chSnap) => {
                        document.getElementById('loading').style.display = 'none';
                        
                        let rawContacts = [];
                        let rawDues = [];
                        allChalans = [];

                        if(cSnap.exists()) {
                            const cd = cSnap.val();
                            if(cd.customers) Object.values(cd.customers).forEach(c => { if(c.shop_id === SHOP_ID) rawContacts.push({...c, cType: 'customer'}); });
                            if(cd.suppliers) Object.values(cd.suppliers).forEach(c => { if(c.shop_id === SHOP_ID) rawContacts.push({...c, cType: 'supplier'}); });
                        }

                        if(dSnap.exists()) {
                            rawDues = Object.entries(dSnap.val()).map(([id, val]) => ({id, ...val})).filter(d => d.shop_id === SHOP_ID);
                        }

                        if(chSnap.exists()) {
                            allChalans = Object.entries(chSnap.val()).map(([id, val]) => ({id, ...val})).filter(c => c.shop_id === SHOP_ID);
                        }

                        mergedData = [];
                        rawContacts.forEach(c => {
                            let d = rawDues.find(x => x.name === c.name);
                            mergedData.push({
                                name: c.name, phone: c.phone || '', cType: c.cType,
                                due_id: d ? d.id : null, 
                                current_due: d ? d.current_due : 0,
                                type: d ? d.type : (c.cType === 'customer' ? 'receive' : 'pay')
                            });
                        });

                        rawDues.forEach(d => {
                            if(!mergedData.find(m => m.name === d.name)) {
                                mergedData.push({
                                    name: d.name, phone: '', cType: d.type === 'receive' ? 'customer' : 'supplier',
                                    due_id: d.id, current_due: d.current_due, type: d.type
                                });
                            }
                        });

                        renderList();
                        
                        if(currentContact) {
                            const updated = mergedData.find(m => m.name === currentContact.name);
                            if(updated) { currentContact = updated; updateLedgerHeader(); renderActiveChalans(); }
                        }
                    });
                });
            });
        }

        window.renderList = () => {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const list = document.getElementById('contactList');
            list.innerHTML = '';

            let filtered = mergedData.filter(m => m.name.toLowerCase().includes(term));
            filtered.sort((a,b) => b.current_due - a.current_due || a.name.localeCompare(b.name));

            filtered.forEach(m => {
                const isCustomer = m.type === 'receive';
                const color = isCustomer ? 'var(--success)' : 'var(--danger)';
                const statusText = m.current_due > 0 ? (isCustomer ? 'Will Receive' : 'Will Pay') : 'Clear';
                const cardClass = m.current_due > 0 ? (isCustomer ? 'customer' : 'supplier') : '';

                const html = `
                <div class="contact-card ${cardClass}" onclick="openLedger('${m.name.replace(/'/g, "\\'")}')">
                    <div class="cc-info">
                        <div class="cc-name">${m.name}</div>
                        <div class="cc-type">${isCustomer ? 'Customer' : 'Supplier'}</div>
                    </div>
                    <div class="cc-balance">
                        <div class="cc-amt" style="color: ${m.current_due > 0 ? color : 'var(--text-dark)'}">৳${m.current_due.toLocaleString()}</div>
                        <div class="cc-status">${statusText}</div>
                    </div>
                </div>`;
                list.insertAdjacentHTML('beforeend', html);
            });
        };

        window.openLedger = (name) => {
            currentContact = mergedData.find(m => m.name === name);
            if(!currentContact) return;

            document.getElementById('mainView').style.display = 'none';
            document.getElementById('ledgerView').style.display = 'flex';
            
            document.getElementById('cMemo').value = '';
            document.getElementById('cDetails').value = '';
            document.getElementById('cAmount').value = '';

            updateLedgerHeader();
            renderActiveChalans();
        };

        window.closeLedger = () => {
            document.getElementById('ledgerView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
            currentContact = null;
        };

        function updateLedgerHeader() {
            document.getElementById('lvName').innerText = currentContact.name;
            document.getElementById('lvBalance').innerText = `৳${currentContact.current_due.toLocaleString()}`;
            document.getElementById('lvTypeStatus').innerText = currentContact.current_due > 0 ? 'Total Due Amount' : 'Account is Clear';
        }

        // --- SUBMIT NEW CHALAN ---
        window.submitChalan = async () => {
            const memo = document.getElementById('cMemo').value.trim();
            const dateVal = document.getElementById('cDate').value;
            const details = document.getElementById('cDetails').value.trim();
            const amt = Number(document.getElementById('cAmount').value);

            if(!memo || !details || !amt || amt <= 0) return alert("দয়া করে মেমো নং, বিবরণ এবং সঠিক এমাউন্ট দিন!");

            const btn = document.getElementById('btnSubmitChalan');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                let dueId = currentContact.due_id;
                
                // Ensure profile exists in due_book for total tracking
                if(!dueId) {
                    const newRef = await push(ref(rtdb, 'due_book'), {
                        shop_id: SHOP_ID, name: currentContact.name, type: currentContact.type,
                        current_due: 0, created_at: Date.now(), updated_at: Date.now()
                    });
                    dueId = newRef.key;
                    currentContact.due_id = dueId;
                }

                // Push Chalan Record
                await push(ref(rtdb, 'due_chalans'), {
                    shop_id: SHOP_ID, due_id: dueId, name: currentContact.name,
                    chalan_no: memo, details: details, total_bill: amt, paid_amount: 0, due_amount: amt,
                    status: 'active', date: new Date(dateVal).getTime(), created_at: Date.now()
                });

                // Update Overall Due
                await update(ref(rtdb, `due_book/${dueId}`), { 
                    current_due: currentContact.current_due + amt, updated_at: Date.now() 
                });

                document.getElementById('cMemo').value = '';
                document.getElementById('cDetails').value = '';
                document.getElementById('cAmount').value = '';

            } catch(e) { alert("Error: " + e.message); } 
            finally { btn.innerHTML = 'Create Chalan'; btn.disabled = false; }
        };

        // --- RENDER ACTIVE CHALANS ---
        window.renderActiveChalans = () => {
            const container = document.getElementById('activeChalansContainer');
            container.innerHTML = '';

            // Get active chalans for this contact
            let myChalans = allChalans.filter(c => c.name === currentContact.name && c.status === 'active');
            myChalans.sort((a,b) => b.date - a.date); // Newest first

            if(myChalans.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 30px; color:#9ca3af; font-size:13px; background: white; border-radius: 14px;">কোনো বকেয়া চালান নেই।</div>`;
                return;
            }

            myChalans.forEach(c => {
                const dateStr = new Date(c.date).toLocaleDateString('en-GB');
                
                const html = `
                <div class="chalan-card">
                    <div class="c-header">
                        <span class="c-memo">Memo: ${c.chalan_no}</span>
                        <span class="c-date">${dateStr}</span>
                    </div>
                    <div class="c-details">${c.details}</div>
                    <div class="c-stats">
                        <span style="color: var(--text-dark);">Bill: ৳${c.total_bill}</span>
                        <span style="color: var(--success);">Paid: ৳${c.paid_amount}</span>
                        <span style="color: var(--danger); font-size: 14px;">Due: ৳${c.due_amount}</span>
                    </div>
                    <div class="c-actions">
                        <button class="btn-pay" onclick="openPaymentModal('${c.id}', '${c.chalan_no}', ${c.due_amount})">Pay / জমা দিন</button>
                        <button class="btn-pdf" onclick="downloadChalanPDF('${c.id}')"><i class="fas fa-print"></i> PDF</button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        };

        // --- PAYMENT LOGIC ---
        window.openPaymentModal = (id, memo, due) => {
            selectedChalanId = id;
            document.getElementById('payMemoNo').innerText = memo;
            document.getElementById('payDueAmt').innerText = due;
            document.getElementById('payAmountInput').value = due; // Default to full due
            document.getElementById('paymentModal').style.display = 'flex';
        };

        window.closePaymentModal = () => {
            document.getElementById('paymentModal').style.display = 'none';
            selectedChalanId = null;
        };

        window.processPayment = async () => {
            const amt = Number(document.getElementById('payAmountInput').value);
            const chalan = allChalans.find(c => c.id === selectedChalanId);
            
            if(!amt || amt <= 0 || !chalan) return alert("Invalid amount!");
            if(amt > chalan.due_amount) return alert("জমার পরিমাণ বকেয়ার চেয়ে বেশি হতে পারে না!");

            const btn = document.getElementById('btnConfirmPay');
            btn.innerText = "Processing..."; btn.disabled = true;

            try {
                let newPaid = chalan.paid_amount + amt;
                let newDue = chalan.due_amount - amt;
                let newStatus = newDue <= 0 ? 'cleared' : 'active';

                // Update Chalan Record
                await update(ref(rtdb, `due_chalans/${chalan.id}`), {
                    paid_amount: newPaid, due_amount: newDue, status: newStatus
                });

                // Update Overall Due Book
                await update(ref(rtdb, `due_book/${currentContact.due_id}`), {
                    current_due: currentContact.current_due - amt, updated_at: Date.now()
                });

                // Auto Cashbox Update
                const cashType = currentContact.type === 'receive' ? 'cash_in' : 'cash_out';
                const cashModifier = currentContact.type === 'receive' ? amt : -amt;
                
                await runTransaction(ref(rtdb, `cash_settings/${SHOP_ID}/current_balance`), (bal) => (bal || 0) + cashModifier);
                await push(ref(rtdb, 'cash_transactions'), {
                    shop_id: SHOP_ID, type: cashType, source: 'chalan_payment',
                    amount: amt, note: `Memo ${chalan.chalan_no} Pymt (${currentContact.name})`, created_at: Date.now()
                });

                closePaymentModal();
            } catch(e) { alert("Error: " + e.message); }
            finally { btn.innerText = "Save Payment"; btn.disabled = false; }
        };

        // --- PDF GENERATION FOR INDIVIDUAL CHALAN ---
        window.downloadChalanPDF = (id) => {
            const c = allChalans.find(x => x.id === id);
            if(!c) return;
            
            const dateStr = new Date(c.date).toLocaleDateString('en-GB');

            const html = `
                <div style="padding: 30px; font-family: 'Hind Siliguri', sans-serif; color: #1f2937; line-height: 1.5;">
                    <div style="text-align: center; margin-bottom: 30px; border-bottom: 2px solid #4F46E5; padding-bottom: 15px;">
                        <h1 style="margin: 0; font-size: 28px; color: #4F46E5;">${SHOP_NAME}</h1>
                        <h3 style="margin: 5px 0 0 0; font-size: 16px; color: #6b7280; letter-spacing: 1px;">INVOICE / CHALLAN</h3>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 14px;">
                        <div>
                            <p style="margin: 0;"><strong>Billed To:</strong></p>
                            <h3 style="margin: 5px 0; font-size: 18px;">${c.name}</h3>
                            <p style="margin: 0; color: #6b7280;">Account Type: ${currentContact.type === 'receive' ? 'Customer' : 'Supplier'}</p>
                        </div>
                        <div style="text-align: right;">
                            <p style="margin: 0;"><strong>Memo/Challan No:</strong> <span style="font-size: 16px; font-weight: bold;">${c.chalan_no}</span></p>
                            <p style="margin: 5px 0 0 0;"><strong>Date:</strong> ${dateStr}</p>
                        </div>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <h4 style="border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 15px;">Product Details (পণ্যের বিবরণ)</h4>
                        <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e5e7eb; white-space: pre-wrap; font-size: 14px; min-height: 100px;">${c.details}</div>
                    </div>

                    <div style="width: 50%; margin-left: auto; font-size: 14px;">
                        <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed #cbd5e1; padding: 8px 0;">
                            <strong>Total Bill Amount:</strong> <span>৳${c.total_bill}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed #cbd5e1; padding: 8px 0; color: green;">
                            <strong>Total Paid Amount:</strong> <span>৳${c.paid_amount}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 10px 0; font-size: 18px; color: red;">
                            <strong>Current Due:</strong> <strong>৳${c.due_amount}</strong>
                        </div>
                        <div style="text-align: right; font-size: 12px; margin-top: 5px; color: ${c.status === 'cleared' ? 'green' : 'red'}; font-weight: bold; text-transform: uppercase;">
                            Status: ${c.status === 'cleared' ? 'PAID / CLEARED' : 'DUE'}
                        </div>
                    </div>
                    
                    <div style="margin-top: 50px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; padding-top: 15px;">
                        Generated automatically via Stashio Management App
                    </div>
                </div>
            `;

            const tempDiv = document.createElement('div'); tempDiv.innerHTML = html;
            html2pdf().set({ 
                margin: 10, 
                filename: `Challan_${c.chalan_no}_${c.name}.pdf`, 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            }).from(tempDiv).save();
        };
    </script>
</body>
</html>
