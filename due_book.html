<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Ledger Book - Stashio</title>
    
    <meta name="theme-color" content="#4F46E5">

    <script>
        const loggedInUser = localStorage.getItem('tempUserPhone') || sessionStorage.getItem('tempUserPhone') || localStorage.getItem('userPhone');
        const activeShopId = localStorage.getItem('activeShopId');
        if (!loggedInUser || !activeShopId) window.location.replace("index.html");
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --secondary: #ec4899; --bg-color: #f3f4f6;
            --white: #ffffff; --text-dark: #1f2937; --text-light: #6b7280;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --border-radius: 16px; --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 30px; }

        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* App Header */
        .app-header { position: relative; padding: 20px 20px 40px 20px; color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; z-index: 50; }
        .header-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); z-index: 1; }
        #dynamicThemeContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; overflow: hidden; }
        .header-top { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .header-title { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 700; }
        .header-title a { color: white; text-decoration: none; }
        .btn-pdf-main { background: rgba(255,255,255,0.2); border: none; padding: 8px 12px; border-radius: 10px; color: white; font-size: 12px; font-weight: 600; cursor: pointer; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-pdf-main:active { transform: scale(0.95); }

        /* Filter Area */
        .filter-card { background: var(--white); border-radius: 16px; padding: 15px; margin: -20px 15px 15px 15px; box-shadow: var(--shadow); position: relative; z-index: 60; border: 1px solid #f8fafc; }
        .search-box { position: relative; margin-bottom: 10px; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px; border: 1px solid #e5e7eb; outline: none; font-size: 13px; background: #f8fafc; transition: 0.3s; }
        .search-box input:focus { border-color: var(--primary); background: white; }
        
        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .date-input label { display: block; font-size: 10px; font-weight: 700; color: var(--text-light); margin-bottom: 3px; text-transform: uppercase; }
        .date-input input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #e5e7eb; font-size: 12px; font-family: inherit; background: #f8fafc; outline:none; }

        /* Ledger List */
        .ledger-container { padding: 0 15px; display: flex; flex-direction: column; gap: 12px; }
        .contact-card { background: var(--white); border-radius: 14px; padding: 15px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #cbd5e1; cursor: pointer; transition: 0.2s; border-top: 1px solid #f8fafc; border-right: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; }
        .contact-card:active { transform: scale(0.98); }
        .contact-card.customer { border-left-color: var(--success); }
        .contact-card.supplier { border-left-color: var(--danger); }
        
        .cc-info { flex: 1; }
        .cc-name { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; }
        .cc-type { font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; padding: 2px 8px; background: #f1f5f9; border-radius: 6px; display: inline-block; }
        .cc-balance { text-align: right; }
        .cc-amt { font-size: 18px; font-weight: 800; line-height: 1.2; }
        .cc-status { font-size: 11px; font-weight: 600; color: var(--text-light); }

        /* Full Screen Ledger View */
        #ledgerView { display: none; position: fixed; inset: 0; background: var(--bg-color); z-index: 999; flex-direction: column; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .lv-header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10; }
        .btn-back { background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 10px; font-size: 16px; cursor: pointer; color: var(--text-dark); }
        .lv-title { font-size: 16px; font-weight: 700; text-align: center; flex: 1; }
        .btn-pdf-single { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .lv-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        .stat-box { background: linear-gradient(135deg, var(--primary), #764ba2); padding: 20px; border-radius: 16px; color: white; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }
        .stat-box p { font-size: 12px; font-weight: 600; opacity: 0.8; margin-bottom: 5px; text-transform: uppercase; }
        .stat-box h2 { font-size: 32px; font-weight: 800; margin: 0; }

        /* Action Form */
        .action-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid #f8fafc; }
        .radio-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .radio-label { flex: 1; position: relative; }
        .radio-label input { display: none; }
        .radio-box { padding: 10px; text-align: center; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 12px; font-weight: 700; color: var(--text-light); cursor: pointer; transition: 0.2s; }
        .radio-label input:checked + .radio-box { border-color: var(--primary); background: #f0f5ff; color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .custom-input { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 13px; font-family: inherit; outline: none; background: #f8fafc; }
        .custom-input:focus { border-color: var(--primary); background: white; }
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-submit:active { transform: scale(0.98); }

        /* History Table */
        .history-card { background: white; border-radius: 16px; padding: 15px; box-shadow: var(--shadow); border: 1px solid #f8fafc; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f1f5f9; padding: 10px; text-align: left; color: var(--text-light); font-weight: 700; border-bottom: 2px solid #e5e7eb; white-space: nowrap; }
        td { padding: 12px 10px; border-bottom: 1px dashed #e5e7eb; color: var(--text-dark); vertical-align: top; }
        tr:last-child td { border-bottom: none; }
        .amt-in { color: var(--success); font-weight: 700; }
        .amt-out { color: var(--danger); font-weight: 700; }
        .bal-col { font-weight: 800; text-align: right; color: var(--primary); }
    </style>
</head>
<body>

    <div id="mainView">
        <div class="app-header" id="header-container">
            <div class="header-bg"></div>
            <div id="dynamicThemeContainer"></div>
            <div class="header-top">
                <div class="header-title">
                    <a href="home.html"><i class="fas fa-arrow-left"></i></a>
                    <span>All Contacts & Ledger</span>
                </div>
                <button onclick="downloadMasterPDF()" class="btn-pdf-main" id="btnMasterPdf"><i class="fas fa-print"></i> Master PDF</button>
            </div>
        </div>

        <div class="filter-card">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search Customer or Supplier..." oninput="renderList()">
            </div>
            <div class="date-grid">
                <div class="date-input">
                    <label>From Date</label>
                    <input type="date" id="globalFromDate" onchange="renderList()">
                </div>
                <div class="date-input">
                    <label>To Date</label>
                    <input type="date" id="globalToDate" onchange="renderList()">
                </div>
            </div>
            <p style="font-size: 10px; color: var(--text-light); margin-top: 8px; text-align: center;">* Select dates to filter History & Master PDF</p>
        </div>

        <div id="loading" style="text-align: center; padding: 40px; color: var(--text-light); font-weight: 600; font-size: 13px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: var(--primary); margin-bottom: 10px;"></i><br>Syncing Ledger...
        </div>

        <div class="ledger-container" id="contactList"></div>
    </div>

    <div id="ledgerView">
        <div class="lv-header">
            <button class="btn-back" onclick="closeLedger()"><i class="fas fa-arrow-left"></i></button>
            <div class="lv-title" id="lvName">Name</div>
            <button class="btn-pdf-single" onclick="downloadSinglePDF()"><i class="fas fa-print"></i> Print Memo</button>
        </div>

        <div class="lv-content">
            <div class="stat-box">
                <p>Current Balance</p>
                <h2 id="lvBalance">৳0</h2>
                <div style="font-size: 12px; margin-top: 5px; opacity: 0.9;" id="lvTypeStatus"></div>
            </div>

            <div class="action-card">
                <h4 style="font-size: 13px; margin-bottom: 12px; color: var(--text-dark);">New Transaction (নতুন হিসাব)</h4>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="transType" value="add_bill" checked>
                        <div class="radio-box" id="lblAddBill">Add Bill (বাকি)</div>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="transType" value="payment">
                        <div class="radio-box" id="lblPayment">Payment (জমা)</div>
                    </label>
                </div>
                <div class="input-grid">
                    <input type="number" id="tAmount" class="custom-input" placeholder="Amount (৳)" required step="any">
                    <input type="date" id="tDate" class="custom-input" required>
                </div>
                <input type="text" id="tNote" class="custom-input" placeholder="Memo No / Description (যেমন: মেমো ১২)" style="margin-bottom: 12px;">
                <button class="btn-submit" id="btnSubmitTrans" onclick="submitTransaction()">Save Record</button>
            </div>

            <div class="history-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h4 style="font-size: 13px; color: var(--text-dark); margin: 0;">History (মেমো অনুযায়ী)</h4>
                </div>
                <div style="overflow-x: auto;">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Details / Memo</th>
                                <th style="text-align:right;">Bill(+)</th>
                                <th style="text-align:right;">Paid(-)</th>
                                <th style="text-align:right;">Balance</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { rtdb, ref, onValue, push, update, get } from './firebase_config.js';
        import { runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const SHOP_ID = localStorage.getItem('activeShopId');
        const SHOP_NAME = localStorage.getItem('activeShopName') || 'Stashio Store';

        let mergedData = [];
        let allHistory = [];
        let currentContact = null;

        window.onload = async () => {
            document.getElementById('tDate').valueAsDate = new Date();
            
            // Header Theme Sync
            onValue(ref(rtdb, `global_settings/header_theme`), (snap) => {
                if (snap.exists() && snap.val().code) {
                    document.getElementById('dynamicThemeContainer').innerHTML = snap.val().code;
                    document.body.classList.add('has-theme');
                }
            });

            loadMasterData();
        };

        // Load Contacts, Due Book and History
        function loadMasterData() {
            onValue(ref(rtdb, 'contacts'), (cSnap) => {
                onValue(ref(rtdb, 'due_book'), (dSnap) => {
                    onValue(ref(rtdb, 'due_history'), (hSnap) => {
                        document.getElementById('loading').style.display = 'none';
                        
                        let rawContacts = [];
                        let rawDues = [];
                        allHistory = [];

                        if(cSnap.exists()) {
                            const cd = cSnap.val();
                            if(cd.customers) Object.values(cd.customers).forEach(c => { if(c.shop_id === SHOP_ID) rawContacts.push({...c, cType: 'customer'}); });
                            if(cd.suppliers) Object.values(cd.suppliers).forEach(c => { if(c.shop_id === SHOP_ID) rawContacts.push({...c, cType: 'supplier'}); });
                        }

                        if(dSnap.exists()) {
                            rawDues = Object.entries(dSnap.val()).map(([id, val]) => ({id, ...val})).filter(d => d.shop_id === SHOP_ID);
                        }

                        if(hSnap.exists()) {
                            allHistory = Object.values(hSnap.val()).filter(h => h.shop_id === SHOP_ID);
                        }

                        mergedData = [];
                        
                        // 1. Add all from Contacts
                        rawContacts.forEach(c => {
                            let d = rawDues.find(x => x.name === c.name);
                            mergedData.push({
                                name: c.name, phone: c.phone || '', cType: c.cType,
                                due_id: d ? d.id : null, 
                                current_due: d ? d.current_due : 0,
                                type: d ? d.type : (c.cType === 'customer' ? 'receive' : 'pay')
                            });
                        });

                        // 2. Add dues that are not in contacts list
                        rawDues.forEach(d => {
                            if(!mergedData.find(m => m.name === d.name)) {
                                mergedData.push({
                                    name: d.name, phone: '', cType: d.type === 'receive' ? 'customer' : 'supplier',
                                    due_id: d.id, current_due: d.current_due, type: d.type
                                });
                            }
                        });

                        renderList();
                        
                        // Auto update detail view if open
                        if(currentContact) {
                            const updated = mergedData.find(m => m.name === currentContact.name);
                            if(updated) { currentContact = updated; updateLedgerHeader(); renderHistory(); }
                        }
                    });
                });
            });
        }

        window.renderList = () => {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const list = document.getElementById('contactList');
            list.innerHTML = '';

            let filtered = mergedData.filter(m => m.name.toLowerCase().includes(term));
            
            // Sort: Dues first (high to low), then alphabetical
            filtered.sort((a,b) => b.current_due - a.current_due || a.name.localeCompare(b.name));

            filtered.forEach(m => {
                const isCustomer = m.type === 'receive';
                const typeText = isCustomer ? 'Customer' : 'Supplier';
                const color = isCustomer ? 'var(--success)' : 'var(--danger)';
                const statusText = m.current_due > 0 ? (isCustomer ? 'Will Receive (পাব)' : 'Will Pay (দিব)') : 'Clear';
                const cardClass = m.current_due > 0 ? (isCustomer ? 'customer' : 'supplier') : '';

                const html = `
                <div class="contact-card ${cardClass}" onclick="openLedger('${m.name.replace(/'/g, "\\'")}')">
                    <div class="cc-info">
                        <div class="cc-name">${m.name}</div>
                        <div class="cc-type">${typeText}</div>
                    </div>
                    <div class="cc-balance">
                        <div class="cc-amt" style="color: ${m.current_due > 0 ? color : 'var(--text-dark)'}">৳${m.current_due.toLocaleString()}</div>
                        <div class="cc-status">${statusText}</div>
                    </div>
                </div>`;
                list.insertAdjacentHTML('beforeend', html);
            });
        };

        // --- DETAILED VIEW LOGIC ---
        window.openLedger = (name) => {
            currentContact = mergedData.find(m => m.name === name);
            if(!currentContact) return;

            document.getElementById('mainView').style.display = 'none';
            document.getElementById('ledgerView').style.display = 'flex';

            if(currentContact.type === 'receive') {
                document.getElementById('lblAddBill').innerText = "Add Bill (মাল নিল)";
                document.getElementById('lblPayment').innerText = "Receive (টাকা দিল)";
            } else {
                document.getElementById('lblAddBill').innerText = "Add Bill (মাল নিলাম)";
                document.getElementById('lblPayment').innerText = "Pay (টাকা দিলাম)";
            }
            
            document.getElementById('tAmount').value = '';
            document.getElementById('tNote').value = '';

            updateLedgerHeader();
            renderHistory();
        };

        window.closeLedger = () => {
            document.getElementById('ledgerView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
            currentContact = null;
        };

        function updateLedgerHeader() {
            document.getElementById('lvName').innerText = currentContact.name;
            document.getElementById('lvBalance').innerText = `৳${currentContact.current_due.toLocaleString()}`;
            document.getElementById('lvTypeStatus').innerText = currentContact.current_due > 0 ? (currentContact.type === 'receive' ? 'Receivable Balance' : 'Payable Balance') : 'Account is Clear';
        }

        window.renderHistory = () => {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';

            const fromD = document.getElementById('globalFromDate').value;
            const toD = document.getElementById('globalToDate').value;

            let myHistory = allHistory.filter(h => h.name === currentContact.name);

            // Apply Date Filter
            if(fromD) myHistory = myHistory.filter(h => h.date >= new Date(fromD).getTime());
            if(toD) myHistory = myHistory.filter(h => h.date <= new Date(toD).getTime() + 86400000);

            // Sort Newest first for view
            myHistory.sort((a,b) => b.date - a.date);

            if(myHistory.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 20px; color:#9ca3af;">No transaction records found.</td></tr>`;
                return;
            }

            myHistory.forEach(h => {
                const dateObj = new Date(h.date);
                const dateStr = `${dateObj.toLocaleDateString('en-GB')}<br><span style="font-size:9px;color:#9ca3af;">${dateObj.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`;
                
                const isPayment = h.action.toLowerCase().includes('payment') || h.action.toLowerCase().includes('paid') || h.action.toLowerCase().includes('received');
                
                tbody.innerHTML += `
                    <tr>
                        <td>${dateStr}</td>
                        <td style="font-weight:600;">${h.action}</td>
                        <td style="text-align:right;" class="amt-out">${!isPayment ? '৳'+h.amount : '-'}</td>
                        <td style="text-align:right;" class="amt-in">${isPayment ? '৳'+h.amount : '-'}</td>
                        <td class="bal-col">৳${h.balance_left !== undefined ? h.balance_left : '-'}</td>
                    </tr>
                `;
            });
        };

        // --- SUBMIT TRANSACTION ---
        window.submitTransaction = async () => {
            const amt = Number(document.getElementById('tAmount').value);
            const dateVal = document.getElementById('tDate').value;
            let note = document.getElementById('tNote').value.trim();
            const isAddBill = document.querySelector('input[name="transType"]:checked').value === 'add_bill';

            if(!amt || amt <= 0) return alert("Enter a valid amount!");
            if(!dateVal) return alert("Select a date!");

            const btn = document.getElementById('btnSubmitTrans');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                let dueId = currentContact.due_id;
                let newBalance = 0;

                // Create profile if doesn't exist
                if(!dueId) {
                    const newRef = await push(ref(rtdb, 'due_book'), {
                        shop_id: SHOP_ID, name: currentContact.name, type: currentContact.type,
                        total_amount: 0, current_due: 0, created_at: Date.now(), updated_at: Date.now()
                    });
                    dueId = newRef.key;
                    currentContact.due_id = dueId;
                }

                // Calculate Balance
                if(isAddBill) {
                    newBalance = currentContact.current_due + amt;
                    if(!note) note = "New Bill Added";
                } else {
                    if(amt > currentContact.current_due) { alert("Payment exceeds current due!"); throw new Error("Exceeds due"); }
                    newBalance = currentContact.current_due - amt;
                    if(!note) note = "Payment Received/Paid";
                }

                const actionText = `${isAddBill ? 'Bill Added' : 'Payment'} ${note ? ' ('+note+')' : ''}`;

                // Update DB
                await update(ref(rtdb, `due_book/${dueId}`), { current_due: newBalance, updated_at: Date.now() });

                await push(ref(rtdb, 'due_history'), {
                    due_id: dueId, shop_id: SHOP_ID, name: currentContact.name, type: currentContact.type,
                    action: actionText, amount: amt, balance_left: newBalance, date: new Date(dateVal).getTime()
                });

                // Auto Cashbox Update for Payments
                if(!isAddBill) {
                    const cashModifier = currentContact.type === 'receive' ? amt : -amt;
                    const cashType = currentContact.type === 'receive' ? 'cash_in' : 'cash_out';
                    
                    await runTransaction(ref(rtdb, `cash_settings/${SHOP_ID}/current_balance`), (bal) => (bal || 0) + cashModifier);
                    await push(ref(rtdb, 'cash_transactions'), {
                        shop_id: SHOP_ID, type: cashType, source: 'due_ledger',
                        amount: amt, note: `Ledger Pymt: ${currentContact.name} (${note})`, created_at: Date.now()
                    });
                }

                document.getElementById('tAmount').value = '';
                document.getElementById('tNote').value = '';
            } catch(e) { 
                if(e.message !== "Exceeds due") alert("Error: " + e.message); 
            } finally {
                btn.innerHTML = 'Save Record'; btn.disabled = false;
            }
        };

        // --- SINGLE PDF (SPECIFIC CONTACT) ---
        window.downloadSinglePDF = () => {
            const fromD = document.getElementById('globalFromDate').value;
            const toD = document.getElementById('globalToDate').value;
            const dateStr = (fromD && toD) ? `${fromD} to ${toD}` : `All Time (Till ${new Date().toLocaleDateString('en-GB')})`;

            let myHistory = allHistory.filter(h => h.name === currentContact.name);
            if(fromD) myHistory = myHistory.filter(h => h.date >= new Date(fromD).getTime());
            if(toD) myHistory = myHistory.filter(h => h.date <= new Date(toD).getTime() + 86400000);
            myHistory.sort((a,b) => a.date - b.date); // Ascending for PDF

            let rows = '';
            myHistory.forEach(h => {
                const date = new Date(h.date).toLocaleDateString('en-GB');
                const isPayment = h.action.toLowerCase().includes('payment') || h.action.toLowerCase().includes('paid') || h.action.toLowerCase().includes('received');
                
                rows += `
                <tr>
                    <td style="padding: 8px; border: 1px solid #ddd;">${date}</td>
                    <td style="padding: 8px; border: 1px solid #ddd;">${h.action}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align:right;">${!isPayment ? '৳'+h.amount : '-'}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align:right;">${isPayment ? '৳'+h.amount : '-'}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align:right; font-weight:bold;">৳${h.balance_left}</td>
                </tr>`;
            });

            const html = `
                <div style="padding: 20px; font-family: 'Hind Siliguri', sans-serif; color: #1f2937;">
                    <div style="text-align: center; margin-bottom: 20px; border-bottom: 2px solid #4F46E5; padding-bottom: 15px;">
                        <h2 style="margin: 0; font-size: 26px;">${SHOP_NAME}</h2>
                        <h3 style="margin: 5px 0 0 0; font-size: 16px; color: #6b7280;">Personal Ledger Report (মেমো হিস্টোরি)</h3>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 13px;">
                        <div>
                            <strong>Name:</strong> ${currentContact.name}<br>
                            <strong>Type:</strong> ${currentContact.type === 'receive' ? 'Customer' : 'Supplier'}
                        </div>
                        <div style="text-align: right;">
                            <strong>Date Filter:</strong><br>${dateStr}<br>
                            <strong style="font-size: 16px; color: ${currentContact.current_due>0?'red':'green'}; margin-top:5px; display:block;">Current Balance: ৳${currentContact.current_due}</strong>
                        </div>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; font-size: 12px; text-align: left;">
                        <thead style="background: #f1f5f9;">
                            <tr>
                                <th style="padding: 8px; border: 1px solid #ddd;">Date</th>
                                <th style="padding: 8px; border: 1px solid #ddd;">Description / Memo</th>
                                <th style="padding: 8px; border: 1px solid #ddd; text-align:right;">Bill (+)</th>
                                <th style="padding: 8px; border: 1px solid #ddd; text-align:right;">Paid (-)</th>
                                <th style="padding: 8px; border: 1px solid #ddd; text-align:right;">Balance</th>
                            </tr>
                        </thead>
                        <tbody>${rows || '<tr><td colspan="5" style="text-align:center; padding:15px;">No transactions in this period.</td></tr>'}</tbody>
                    </table>
                </div>
            `;

            const tempDiv = document.createElement('div'); tempDiv.innerHTML = html;
            html2pdf().set({ margin: 10, filename: `${currentContact.name}_Memo.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(tempDiv).save();
        };

        // --- MASTER PDF (ALL CONTACTS HISTORY BY DATE) ---
        window.downloadMasterPDF = () => {
            const btn = document.getElementById('btnMasterPdf');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Wait...';
            
            const fromD = document.getElementById('globalFromDate').value;
            const toD = document.getElementById('globalToDate').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dateStr = (fromD && toD) ? `${fromD} to ${toD}` : `All Time Report`;

            // Filter all history globally
            let printHistory = allHistory;
            if(fromD) printHistory = printHistory.filter(h => h.date >= new Date(fromD).getTime());
            if(toD) printHistory = printHistory.filter(h => h.date <= new Date(toD).getTime() + 86400000);
            if(search) printHistory = printHistory.filter(h => h.name.toLowerCase().includes(search));
            
            printHistory.sort((a,b) => a.date - b.date); // Sort Ascending

            let rows = '';
            let totalBill = 0, totalPaid = 0;

            printHistory.forEach(h => {
                const date = new Date(h.date).toLocaleDateString('en-GB');
                const isPayment = h.action.toLowerCase().includes('payment') || h.action.toLowerCase().includes('paid') || h.action.toLowerCase().includes('received');
                
                if(!isPayment) totalBill += Number(h.amount);
                else totalPaid += Number(h.amount);

                rows += `
                <tr>
                    <td style="padding: 8px; border: 1px solid #ddd;">${date}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; font-weight:bold;">${h.name}</td>
                    <td style="padding: 8px; border: 1px solid #ddd;">${h.action}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align:right; color:red;">${!isPayment ? '৳'+h.amount : '-'}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align:right; color:green;">${isPayment ? '৳'+h.amount : '-'}</td>
                </tr>`;
            });

            const html = `
                <div style="padding: 20px; font-family: 'Hind Siliguri', sans-serif; color: #1f2937;">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <h2 style="margin: 0; font-size: 26px;">${SHOP_NAME}</h2>
                        <h3 style="margin: 5px 0 0 0; font-size: 16px; color: #6b7280;">Master Ledger History (সকল মেমো হিস্টোরি)</h3>
                        <p style="font-size: 12px; margin-top: 5px;"><strong>Date:</strong> ${dateStr}</p>
                    </div>
                    <table style="width: 100%; border-collapse: collapse; font-size: 12px; text-align: left;">
                        <thead style="background: #4F46E5; color: white;">
                            <tr>
                                <th style="padding: 8px; border: 1px solid #ddd;">Date</th>
                                <th style="padding: 8px; border: 1px solid #ddd;">Name</th>
                                <th style="padding: 8px; border: 1px solid #ddd;">Memo / Details</th>
                                <th style="padding: 8px; border: 1px solid #ddd; text-align:right;">Bill Amount</th>
                                <th style="padding: 8px; border: 1px solid #ddd; text-align:right;">Paid Amount</th>
                            </tr>
                        </thead>
                        <tbody>${rows || '<tr><td colspan="5" style="text-align:center; padding:15px;">No transactions found for these dates.</td></tr>'}</tbody>
                    </table>
                    <div style="margin-top: 15px; text-align: right; font-size: 14px; font-weight: bold;">
                        <span style="color:red; margin-right: 20px;">Total Billed: ৳${totalBill}</span>
                        <span style="color:green;">Total Paid: ৳${totalPaid}</span>
                    </div>
                </div>
            `;

            const tempDiv = document.createElement('div'); tempDiv.innerHTML = html;
            html2pdf().set({ margin: 10, filename: `Master_Ledger_${dateStr}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(tempDiv).save().then(()=>{
                btn.innerHTML = '<i class="fas fa-print"></i> Master PDF';
            });
        };
    </script>
</body>
</html>
