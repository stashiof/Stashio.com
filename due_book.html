<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Due Book - Stashio</title>
    
    <meta name="theme-color" content="#4F46E5">
    <script>
        const activeShopId = localStorage.getItem('activeShopId');
        if (!activeShopId) window.location.replace("dashboard.html");
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4F46E5; --secondary: #ec4899; --bg-color: #f3f4f6;
            --white: #ffffff; --text-dark: #1f2937; --text-light: #6b7280;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 30px; }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            padding: 20px 20px 60px 20px; color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }
        .header-top { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 700; }
        .header-top a { color: white; text-decoration: none; }

        /* Tabs */
        .tab-container { display: flex; background: white; margin: -30px 15px 15px 15px; border-radius: 15px; padding: 5px; box-shadow: var(--shadow); position: relative; z-index: 10; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 700; color: var(--text-light); cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; }

        /* Search & Summary */
        .search-area { padding: 0 15px; margin-bottom: 15px; }
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px; border: none; outline: none; box-shadow: var(--shadow); font-size: 14px; }

        .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; margin-bottom: 20px; }
        .sum-card { background: white; padding: 15px; border-radius: 15px; box-shadow: var(--shadow); text-align: center; }
        .sum-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        .sum-val { font-size: 18px; font-weight: 800; margin-top: 5px; }
        .text-receive { color: var(--success); }
        .text-pay { color: var(--danger); }

        /* List Items */
        .contact-list { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        .contact-card { background: white; padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border: 1px solid #f1f5f9; }
        .c-info h4 { font-size: 14px; font-weight: 700; color: var(--text-dark); }
        .c-info p { font-size: 11px; color: var(--text-light); margin-top: 2px; }
        
        .c-due { text-align: right; }
        .due-amt { font-size: 16px; font-weight: 800; }
        .btn-action { margin-top: 5px; padding: 5px 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-receive { background: #dcfce3; color: var(--success); }
        .btn-pay { background: #fee2e2; color: var(--danger); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 350px; border-radius: 20px; overflow: hidden; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-light); margin-bottom: 5px; }
        .input-field { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none; font-size: 14px; transition: 0.3s; }
        .input-field:focus { border-color: var(--primary); }
        .btn-submit { width: 100%; padding: 14px; border-radius: 12px; border: none; color: white; font-weight: 700; cursor: pointer; }

        #loading { text-align: center; padding: 50px; color: var(--text-light); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-top">
            <a href="home.html"><i class="fas fa-arrow-left"></i></a>
            <span>Due Book (বাকি খাতা)</span>
        </div>
    </div>

    <div class="tab-container">
        <div class="tab active" onclick="switchTab('customers')">Customers</div>
        <div class="tab" onclick="switchTab('suppliers')">Suppliers</div>
        <div class="tab" onclick="switchTab('staffs')">Staffs</div>
    </div>

    <div class="search-area">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by name or phone..." oninput="filterList()">
        </div>
    </div>

    <div class="summary-cards">
        <div class="sum-card">
            <div class="sum-label">To Receive</div>
            <div class="sum-val text-receive" id="totalToReceive">৳0</div>
        </div>
        <div class="sum-card">
            <div class="sum-label">To Pay</div>
            <div class="sum-val text-pay" id="totalToPay">৳0</div>
        </div>
    </div>

    <div id="loading"><i class="fas fa-spinner fa-spin"></i> Loading context...</div>
    <div class="contact-list" id="contactList"></div>

    <div class="modal-overlay" id="trxModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Update Due</h3>
                <button onclick="closeModal()" style="border:none; background:none; font-size:20px;">&times;</button>
            </div>
            <div class="modal-body">
                <form id="trxForm">
                    <input type="hidden" id="targetId">
                    <input type="hidden" id="targetType">
                    <div class="input-group">
                        <label>Current Due: <span id="modalCurrentDue" style="color:var(--primary)">৳0</span></label>
                    </div>
                    <div class="input-group">
                        <label>Transaction Type</label>
                        <select id="trxAction" class="input-field">
                            </select>
                    </div>
                    <div class="input-group">
                        <label>Amount (৳)</label>
                        <input type="number" id="trxAmount" class="input-field" required placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>Note / Remarks</label>
                        <input type="text" id="trxNote" class="input-field" placeholder="e.g. Received partial payment">
                    </div>
                    <button type="submit" id="submitBtn" class="btn-submit">Confirm Transaction</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { rtdb, ref, onValue, push, update } from './firebase_config.js';
        import { runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const SHOP_ID = localStorage.getItem('activeShopId');
        let currentTab = 'customers';
        let allData = { customers: [], suppliers: [], staffs: [] };

        window.onload = () => {
            fetchContacts();
        };

        function fetchContacts() {
            const types = ['customers', 'suppliers', 'staffs'];
            let loadedCount = 0;

            types.forEach(type => {
                onValue(ref(rtdb, `contacts/${type}`), (snap) => {
                    allData[type] = [];
                    if (snap.exists()) {
                        Object.entries(snap.val()).forEach(([id, val]) => {
                            if (val.shop_id === SHOP_ID) {
                                allData[type].push({ id, ...val });
                            }
                        });
                    }
                    loadedCount++;
                    if (loadedCount === 3) {
                        document.getElementById('loading').style.display = 'none';
                        renderList();
                        calculateTotalSummary();
                    }
                });
            });
        }

        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderList();
        };

        window.filterList = () => renderList();

        function renderList() {
            const listEl = document.getElementById('contactList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            listEl.innerHTML = '';

            const filtered = allData[currentTab].filter(item => 
                item.name.toLowerCase().includes(searchTerm) || 
                (item.phone && item.phone.includes(searchTerm))
            );

            if (filtered.length === 0) {
                listEl.innerHTML = `<p style="text-align:center; color:var(--text-light); padding:20px;">No results found.</p>`;
                return;
            }

            filtered.forEach(item => {
                const due = Number(item.due || 0);
                // Customers & Staff usually owe us (Receive), Suppliers we owe (Pay)
                const isPayable = currentTab === 'suppliers';
                const dueColor = isPayable ? 'var(--danger)' : 'var(--success)';
                const btnClass = isPayable ? 'btn-pay' : 'btn-receive';
                const btnText = isPayable ? 'Payment' : 'Collection';

                const html = `
                <div class="contact-card">
                    <div class="c-info">
                        <h4>${item.name}</h4>
                        <p><i class="fas fa-phone-alt"></i> ${item.phone || 'No Phone'}</p>
                    </div>
                    <div class="c-due">
                        <div class="due-amt" style="color:${dueColor}">৳${due.toLocaleString()}</div>
                        <button class="btn-action ${btnClass}" onclick="openTrxModal('${item.id}', '${item.name}', ${due}, '${currentTab}')">
                            <i class="fas fa-plus-circle"></i> ${btnText}
                        </button>
                    </div>
                </div>`;
                listEl.insertAdjacentHTML('beforeend', html);
            });
        }

        function calculateTotalSummary() {
            let receive = 0;
            let pay = 0;

            allData.customers.forEach(c => receive += Number(c.due || 0));
            allData.staffs.forEach(s => receive += Number(s.due || 0));
            allData.suppliers.forEach(sup => pay += Number(sup.due || 0));

            document.getElementById('totalToReceive').innerText = `৳${receive.toLocaleString()}`;
            document.getElementById('totalToPay').innerText = `৳${pay.toLocaleString()}`;
        }

        window.openTrxModal = (id, name, currentDue, type) => {
            document.getElementById('targetId').value = id;
            document.getElementById('targetType').value = type;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalCurrentDue').innerText = `৳${currentDue}`;
            
            const actionSelect = document.getElementById('trxAction');
            actionSelect.innerHTML = '';

            if (type === 'suppliers') {
                actionSelect.innerHTML = `
                    <option value="pay">I am Paying (বাকি কমানো)</option>
                    <option value="add">Add More Due (বাকি বাড়ানো)</option>`;
                document.getElementById('submitBtn').style.background = 'var(--danger)';
            } else {
                actionSelect.innerHTML = `
                    <option value="receive">Receiving Cash (বাকি কমানো)</option>
                    <option value="add">Add More Due (বাকি বাড়ানো)</option>`;
                document.getElementById('submitBtn').style.background = 'var(--success)';
            }

            document.getElementById('trxModal').style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('trxModal').style.display = 'none';
            document.getElementById('trxForm').reset();
        };

        document.getElementById('trxForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const id = document.getElementById('targetId').value;
            const type = document.getElementById('targetType').value;
            const action = document.getElementById('trxAction').value;
            const amount = Number(document.getElementById('trxAmount').value);
            const note = document.getElementById('trxNote').value;

            if (amount <= 0) return alert("Please enter a valid amount");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            try {
                // 1. Update Contact Due
                await runTransaction(ref(rtdb, `contacts/${type}/${id}/due`), (current) => {
                    let val = Number(current) || 0;
                    if (action === 'add') return val + amount;
                    return val - amount; // receive or pay
                });

                // 2. Log History
                await push(ref(rtdb, 'due_history'), {
                    shop_id: SHOP_ID,
                    contact_id: id,
                    contact_type: type,
                    action: action,
                    amount: amount,
                    note: note,
                    date: Date.now()
                });

                // 3. Update Cashbox if cash was actually received or paid
                if (action === 'receive' || action === 'pay') {
                    const cashAction = action === 'receive' ? 'cash_in' : 'cash_out';
                    
                    await runTransaction(ref(rtdb, `cash_settings/${SHOP_ID}/current_balance`), (bal) => {
                        return action === 'receive' ? (bal || 0) + amount : (bal || 0) - amount;
                    });

                    await push(ref(rtdb, 'cash_transactions'), {
                        shop_id: SHOP_ID,
                        type: cashAction,
                        source: 'due_ledger',
                        amount: amount,
                        note: `Due ${action} from ${document.getElementById('modalTitle').innerText}: ${note}`,
                        created_at: Date.now()
                    });
                }

                alert("Transaction Successful!");
                closeModal();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Confirm Transaction';
            }
        });
    </script>
</body>
</html>
