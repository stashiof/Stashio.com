<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Due Ledger - Stashio</title>
    
    <meta name="theme-color" content="#4F46E5">

    <script>
        const loggedInUser = localStorage.getItem('tempUserPhone') || sessionStorage.getItem('tempUserPhone') || localStorage.getItem('userPhone');
        const activeShopId = localStorage.getItem('activeShopId');
        if (!loggedInUser || !activeShopId) window.location.replace("index.html");
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --secondary: #ec4899; --bg-color: #f3f4f6;
            --white: #ffffff; --text-dark: #1f2937; --text-light: #6b7280;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --border-radius: 16px; --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 30px; }

        .app-header { background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); padding: 20px 20px 40px 20px; color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; position: sticky; top: 0; z-index: 50; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-title { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 700; }
        .header-title a { color: white; text-decoration: none; }

        /* Filter Section */
        .filter-card { background: var(--white); border-radius: 16px; padding: 15px; margin: -20px 15px 15px 15px; box-shadow: var(--shadow); position: relative; z-index: 60; display: flex; flex-direction: column; gap: 12px; }
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .search-box input { width: 100%; padding: 12px 12px 12px 35px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 14px; }
        
        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .date-input label { display: block; font-size: 10px; font-weight: 700; color: var(--text-light); margin-bottom: 3px; }
        .date-input input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 12px; }

        /* Ledger List */
        .ledger-container { padding: 0 15px; }
        .contact-card { background: white; border-radius: 14px; padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow); border-left: 5px solid #ddd; cursor: pointer; }
        .contact-card.recv { border-left-color: var(--success); }
        .contact-card.pay { border-left-color: var(--danger); }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .card-name { font-weight: 700; font-size: 15px; }
        .card-due { font-weight: 800; font-size: 16px; }

        /* Detail Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; padding: 10px; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 20px; height: 90vh; display: flex; flex-direction: column; margin: auto; overflow: hidden; }
        .modal-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
        .modal-body { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* Table Style */
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .history-table th { background: #f1f5f9; padding: 8px; text-align: left; border: 1px solid #e2e8f0; }
        .history-table td { padding: 8px; border: 1px solid #e2e8f0; }
        .txt-in { color: var(--success); font-weight: 700; }
        .txt-out { color: var(--danger); font-weight: 700; }

        .btn-pay { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 700; margin-top: 15px; cursor: pointer; }
        .btn-pdf { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-top">
            <div class="header-title">
                <a href="home.html"><i class="fas fa-arrow-left"></i></a>
                <span>Advanced Ledger</span>
            </div>
            <div id="topStats" style="text-align: right; font-size: 12px;">
                <div style="color: #dcfce3;">Recv: <span id="totalRecv">0</span></div>
                <div style="color: #fee2e2;">Pay: <span id="totalPay">0</span></div>
            </div>
        </div>
    </div>

    <div class="filter-card">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search Customer or Supplier..." oninput="filterLedger()">
        </div>
        <div class="date-grid">
            <div class="date-input">
                <label>From Date</label>
                <input type="date" id="fromDate" onchange="filterLedger()">
            </div>
            <div class="date-input">
                <label>To Date</label>
                <input type="date" id="toDate" onchange="filterLedger()">
            </div>
        </div>
    </div>

    <div class="ledger-container" id="ledgerList">
        <div style="text-align:center; padding:50px; color:var(--text-light);">
            <i class="fas fa-spinner fa-spin"></i> Loading Data...
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <div id="modalName" style="font-weight: 800; color: var(--primary);">User Name</div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-pdf" onclick="printSingleLedger()"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button onclick="closeModal()" style="border:none; background:none; font-size:20px;"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="modal-body">
                <div id="statBox" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                    <div style="background:#f0fdf4; padding:10px; border-radius:10px; text-align:center;">
                        <small>Total Bill</small><br><strong id="mTotalBill">0</strong>
                    </div>
                    <div style="background:#fef2f2; padding:10px; border-radius:10px; text-align:center;">
                        <small>Current Due</small><br><strong id="mCurrentDue" style="color:red;">0</strong>
                    </div>
                </div>

                <h4 style="font-size: 13px; margin-bottom: 5px; color: var(--text-light);">Transaction History</h4>
                <div id="historyContent"></div>

                <div style="margin-top:20px; border-top: 1px solid #eee; padding-top:15px;">
                    <h4 style="font-size: 13px; margin-bottom: 10px;">Quick Payment</h4>
                    <input type="number" id="payAmount" placeholder="Enter Amount" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;">
                    <input type="text" id="payNote" placeholder="Note (e.g. Memo #102)" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">
                    <button class="btn-pay" id="payBtn" onclick="submitPayment()">Confirm Payment</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { rtdb, ref, onValue, push, update, get } from './firebase_config.js';
        import { runTransaction } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const SHOP_ID = localStorage.getItem('activeShopId');
        let allDues = [];
        let allHistory = [];
        let selectedContact = null;

        // Load Data
        window.onload = () => {
            // Load Due Book
            onValue(ref(rtdb, 'due_book'), (snap) => {
                if(snap.exists()){
                    allDues = Object.entries(snap.val()).map(([id, val]) => ({id, ...val})).filter(d => d.shop_id === SHOP_ID);
                    filterLedger();
                }
            });

            // Load History
            onValue(ref(rtdb, 'due_history'), (snap) => {
                if(snap.exists()){
                    allHistory = Object.entries(snap.val()).map(([id, val]) => ({id, ...val})).filter(h => h.shop_id === SHOP_ID);
                }
            });
        };

        window.filterLedger = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('ledgerList');
            list.innerHTML = '';

            let sumRecv = 0, sumPay = 0;

            const filtered = allDues.filter(d => d.name.toLowerCase().includes(term));

            filtered.forEach(d => {
                if(d.type === 'receive') sumRecv += Number(d.current_due);
                else sumPay += Number(d.current_due);

                const card = document.createElement('div');
                card.className = `contact-card ${d.type === 'receive' ? 'recv' : 'pay'}`;
                card.onclick = () => openDetails(d);
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-name">${d.name}</span>
                        <span class="card-due" style="color:${d.type==='receive'?'green':'red'}">৳${d.current_due}</span>
                    </div>
                    <div style="font-size:11px; color:gray;">Type: ${d.type.toUpperCase()} | Last Update: ${new Date(d.updated_at).toLocaleDateString()}</div>
                `;
                list.appendChild(card);
            });

            document.getElementById('totalRecv').innerText = `৳${sumRecv}`;
            document.getElementById('totalPay').innerText = `৳${sumPay}`;
        };

        window.openDetails = (contact) => {
            selectedContact = contact;
            document.getElementById('modalName').innerText = contact.name;
            document.getElementById('mTotalBill').innerText = `৳${contact.total_amount}`;
            document.getElementById('mCurrentDue').innerText = `৳${contact.current_due}`;
            
            renderHistoryTable();
            document.getElementById('detailModal').style.display = 'flex';
        };

        function renderHistoryTable() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            
            let filteredHistory = allHistory.filter(h => h.due_id === selectedContact.id);

            if(fromDate) filteredHistory = filteredHistory.filter(h => h.date >= new Date(fromDate).getTime());
            if(toDate) filteredHistory = filteredHistory.filter(h => h.date <= new Date(toDate).getTime() + 86400000);

            let html = `<table class="history-table">
                <thead><tr><th>Date</th><th>Action</th><th>Amount</th><th>Balance</th></tr></thead>
                <tbody>`;
            
            filteredHistory.sort((a,b) => b.date - a.date).forEach(h => {
                const date = new Date(h.date).toLocaleDateString('en-GB');
                html += `<tr>
                    <td>${date}</td>
                    <td>${h.action}</td>
                    <td class="${h.action.includes('Received') || h.action.includes('Paid') ? 'txt-in' : ''}">৳${h.amount}</td>
                    <td style="font-weight:bold;">৳${h.balance_left || 0}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById('historyContent').innerHTML = html;
        }

        window.submitPayment = async () => {
            const amt = Number(document.getElementById('payAmount').value);
            const note = document.getElementById('payNote').value || "Manual Payment";
            if(!amt || amt <= 0) return alert("Enter valid amount");
            if(amt > selectedContact.current_due) return alert("Amount exceeds due!");

            const btn = document.getElementById('payBtn');
            btn.disabled = true; btn.innerText = "Processing...";

            const newDue = selectedContact.current_due - amt;
            const actionText = selectedContact.type === 'receive' ? `Received (${note})` : `Paid (${note})`;

            try {
                // Update Due Book
                await update(ref(rtdb, `due_book/${selectedContact.id}`), {
                    current_due: newDue, updated_at: Date.now()
                });

                // Add History
                await push(ref(rtdb, 'due_history'), {
                    due_id: selectedContact.id, shop_id: SHOP_ID, name: selectedContact.name,
                    type: selectedContact.type, action: actionText, amount: amt, 
                    balance_left: newDue, date: Date.now()
                });

                // Update Cashbox
                const cashModifier = selectedContact.type === 'receive' ? amt : -amt;
                await runTransaction(ref(rtdb, `cash_settings/${SHOP_ID}/current_balance`), (bal) => (bal || 0) + cashModifier);
                
                await push(ref(rtdb, 'cash_transactions'), {
                    shop_id: SHOP_ID, type: selectedContact.type === 'receive' ? 'cash_in' : 'cash_out',
                    source: 'due_ledger', amount: amt, note: `Due ${actionText}: ${selectedContact.name}`, created_at: Date.now()
                });

                document.getElementById('payAmount').value = '';
                document.getElementById('payNote').value = '';
                alert("Payment Updated!");
                closeModal();
            } catch(e) { alert(e.message); }
            finally { btn.disabled = false; btn.innerText = "Confirm Payment"; }
        };

        window.printSingleLedger = () => {
            const element = document.getElementById('historyContent');
            const opt = {
                margin: 10,
                filename: `${selectedContact.name}_Ledger.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            const header = `<div style="text-align:center; font-family:sans-serif;">
                <h2>${selectedContact.name} - Ledger Report</h2>
                <p>Current Balance: ৳${selectedContact.current_due}</p>
                <hr>
            </div>`;
            const content = header + element.innerHTML;
            const worker = html2pdf().from(content).set(opt).save();
        };

        window.closeModal = () => { document.getElementById('detailModal').style.display = 'none'; };
    </script>
</body>
</html>
